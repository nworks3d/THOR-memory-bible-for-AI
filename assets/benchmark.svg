<text x="256" y="629.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="648" fill="#c9d1d9" font-size="11">Both cuts are ties. Strict differs on only 5 of 53 questions - below the 6-discordant floor, so no verdict; broad is</text>
<text x="20" y="664" fill="#c9d1d9" font-size="11">12 W / 13 L, p = 1.00. The 2026-07-14 claim that THOR wins both cuts stays retracted.</text>
<text x="20" y="694" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 3 - MULTI-PROJECT  (three private project repos)</text>
