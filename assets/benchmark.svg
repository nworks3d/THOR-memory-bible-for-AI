<text x="838" y="999" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+15%</text>
<rect x="268" y="996" width="212.5" height="14" rx="7" fill="#484f58"/>
<text x="487.52" y="1007.5" fill="#8b949e" font-size="11.5">64%</text>
<text x="256" y="1007.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir full</text>
<rect x="268" y="1026" width="248.8" height="14" rx="7" fill="#22d3ee"/>
<text x="523.82" y="1037.5" fill="#e6edf3" font-size="11.5" font-weight="700">75%</text>
<text x="256" y="1037.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">courier</text>
<text x="20" y="1048" fill="#e6edf3" font-size="13" font-weight="700">Courier vs mimir best</text>
<text x="838" y="1049" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+11%</text>
<rect x="268" y="1046" width="212.5" height="14" rx="7" fill="#484f58"/>
<text x="487.52" y="1057.5" fill="#8b949e" font-size="11.5">64%</text>
<text x="256" y="1057.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir full</text>
<rect x="268" y="1076" width="263.0" height="14" rx="7" fill="#22d3ee"/>
<text x="538.01" y="1087.5" fill="#e6edf3" font-size="11.5" font-weight="700">80%</text>
<text x="256" y="1087.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">session</text>
<text x="20" y="1098" fill="#e6edf3" font-size="13" font-weight="700">Vs mimir's auto hook</text>
<text x="838" y="1099" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+72%</text>
<rect x="268" y="1096" width="25.1" height="14" rx="7" fill="#484f58"/>
<text x="300.08" y="1107.5" fill="#8b949e" font-size="11.5">8%</text>
<text x="256" y="1107.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir hook</text>
<text x="20" y="1126" fill="#c9d1d9" font-size="11">Five arms judged blind together; silence scores zero. Session = courier + guard advisories - the as-deployed channel</text>
<text x="20" y="1142" fill="#c9d1d9" font-size="11">since the action guard landed. Courier alone 75.4, deliberate 70.3, mimir's hook 7.6 (misses 50 of 59, 0 full catches).</text>
<text x="20" y="1158" fill="#c9d1d9" font-size="11">Sign tests: session beats mimir's best 11 W / 0 L (p 0.001), courier beats it 10 W / 2 L (p 0.039); deliberate vs best</text>
<text x="20" y="1174" fill="#c9d1d9" font-size="11">is a tie (9 W / 6 L, p 0.61). This REVERSES last round, where mimir's best beat the courier (p 0.043) - the serving-</text>
<text x="20" y="1190" fill="#c9d1d9" font-size="11">form work sits in between; the corpus was cleaned (73 -> 59) and the jury changed, so it is two honest rounds, not</text>
<text x="20" y="1206" fill="#c9d1d9" font-size="11">one number moving. 17 of 59 scenarios carry no expected call - there session equals courier by construction.</text>
<text x="20" y="1222" fill="#c9d1d9" font-size="11">Separately reproducible in-repo, no judge needed: cargo run --example drift_eval (catches AND false fires).</text>
<text x="20" y="1252" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">SPEED  (per-prompt cost, lower is better)</text>
<text x="20" y="1268" fill="#8b949e" font-size="11">as-deployed, correct invocation each side (THOR stdin hook, mimir prompt arg) . median of 20, warm-up discarded</text>
<rect x="268" y="1278" width="149.4" height="14" rx="7" fill="#22d3ee"/>
<text x="424.39" y="1289.5" fill="#e6edf3" font-size="11.5" font-weight="700">146 ms</text>
<text x="256" y="1289.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="1300" fill="#e6edf3" font-size="13" font-weight="700">Cost per prompt</text>
<text x="838" y="1301" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">2.2x faster</text>
<rect x="268" y="1298" width="330.0" height="14" rx="7" fill="#484f58"/>
<text x="605.00" y="1309.5" fill="#8b949e" font-size="11.5">323 ms</text>
<text x="256" y="1309.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir full</text>
<text x="20" y="1328" fill="#c9d1d9" font-size="11">THOR's courier answers EVERY prompt - 0 of 20 empty - in 146 ms (p90 167). mimir's hook is faster at 40 ms but</text>
<text x="20" y="1344" fill="#c9d1d9" font-size="11">returns nothing on 6 of 20: it is fast because it often serves nothing. The mimir channel that competes on drift</text>
<text x="20" y="1360" fill="#c9d1d9" font-size="11">costs 323 ms and is not a hook. Honestly worse since last round: the courier read 125 ms at 16.1k events and reads</text>
<text x="20" y="1376" fill="#c9d1d9" font-size="11">146 ms at 19.8k - the compute-bound growth is real, and it is why the materialized-heads work is planned.</text>
<text x="20" y="1406" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">HONEST DOWNSIDES</text>
<text x="20" y="1422" fill="#8b949e" font-size="11">where THOR does not win, and the caveats</text>
<circle cx="26" cy="1440" r="3" fill="#e3b341"/>
<text x="38" y="1444" fill="#e6edf3" font-size="11.5">No THOR quality lead is significant: the coverage edge reads p 0.14, and multi-project has mimir ahead (91.1 vs 94.4).</text>
<circle cx="26" cy="1461" r="3" fill="#e3b341"/>
<text x="38" y="1465" fill="#e6edf3" font-size="11.5">Code-structure closed to a TIE, not a win - battery and jury changed across rounds, so it is a within-round reading.</text>
<circle cx="26" cy="1482" r="3" fill="#e3b341"/>
<text x="38" y="1486" fill="#e6edf3" font-size="11.5">The drift reversal carries cross-round caveats: corpus cleaned 73 -&gt; 59, a new jury, and the serving-form work between.</text>
<circle cx="26" cy="1503" r="3" fill="#e3b341"/>
<text x="38" y="1507" fill="#e6edf3" font-size="11.5">This round's FIRST PASS judged mimir's one-line summaries; its arms were regenerated full-body and re-judged before</text>
<circle cx="26" cy="1524" r="3" fill="#e3b341"/>
<text x="38" y="1528" fill="#e6edf3" font-size="11.5">publication - the same error class as the run discarded last round, the other direction. Pass 1 is on file, unpublished.</text>
<circle cx="26" cy="1545" r="3" fill="#e3b341"/>
<text x="38" y="1549" fill="#e6edf3" font-size="11.5">A 7000-char judging cap bound BOTH sides: THOR on 47/59 deliberate and 24/59 session items, mimir full-body on most.</text>
<circle cx="26" cy="1566" r="3" fill="#e3b341"/>
<text x="38" y="1570" fill="#e6edf3" font-size="11.5">Do not compare absolutes across rounds: Test 1 reads 89.2 here vs 73.2 last round - the jury and battery moved, not</text>
<circle cx="26" cy="1587" r="3" fill="#e3b341"/>
<text x="38" y="1591" fill="#e6edf3" font-size="11.5">the products. Read gaps within a round.</text>
<circle cx="26" cy="1608" r="3" fill="#e3b341"/>
<text x="38" y="1612" fill="#e6edf3" font-size="11.5">THOR is compute-bound: 125 ms at 16.1k events -&gt; 146 ms at 19.8k. The daemon hides the cold cost, not the growth.</text>
<circle cx="26" cy="1629" r="3" fill="#e3b341"/>
<text x="38" y="1633" fill="#e6edf3" font-size="11.5">Newer and far less battle-tested than mimir's daily use; mimir ships at a high cadence (v0.15: inference delegation).</text>
<circle cx="26" cy="1650" r="3" fill="#e3b341"/>
<text x="38" y="1654" fill="#e6edf3" font-size="11.5">One machine, private corpus, LLM-judged - only drift is repo-reproducible (examples/drift_eval.rs).</text>
<line x1="20" y1="1683" x2="840" y2="1683" stroke="#21262d" stroke-width="1"/>
<text x="20" y="1703" fill="#e6edf3" font-size="13.5" font-weight="700">Bottom line <tspan fill="#8b949e">quality is a tie with a non-significant THOR edge; multi-project leans mimir</tspan></text>
<text x="20" y="1723" fill="#e6edf3" font-size="13.5" font-weight="700"><tspan fill="#22d3ee">THOR's as-deployed channel wins drift 11-0 (p 0.001): every prompt, 146 ms, never silent</tspan></text>
</svg>
