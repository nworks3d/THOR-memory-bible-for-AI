<circle cx="26" cy="1262" r="3" fill="#e3b341"/>
<text x="38" y="1266" fill="#e6edf3" font-size="11.5">mimir retook the overall multi-project lead this round, 97% vs 94% - its new code-content indexing closed THOR's biggest structural edge</text>
<circle cx="26" cy="1283" r="3" fill="#e3b341"/>
<text x="38" y="1287" fill="#e6edf3" font-size="11.5">mimir now wins code-structure on Test 1, 58% vs 54% - its own tree-sitter CodeChunk indexing, folded into ordinary recall</text>
<circle cx="26" cy="1304" r="3" fill="#e3b341"/>
<text x="38" y="1308" fill="#e6edf3" font-size="11.5">Only config-how-to cleared an 80% bar this round (THOR 85%); every other T1 category and every drift metric stayed below it</text>
<circle cx="26" cy="1325" r="3" fill="#e3b341"/>
<text x="38" y="1329" fill="#e6edf3" font-size="11.5">On this round's speed sample mimir's opt-in warm daemon beats THOR's latency (66 ms vs 234 ms), and THOR injects more tokens than mimir's cold path, not fewer</text>
<circle cx="26" cy="1346" r="3" fill="#e3b341"/>
<text x="38" y="1350" fill="#e6edf3" font-size="11.5">Same-knowledge (Test 2) not re-measured this round; previous round mimir led the strictest dual-written cut (n=53), 94% vs 92% - pure memory recall is its home turf</text>
<circle cx="26" cy="1367" r="3" fill="#e3b341"/>
<text x="38" y="1371" fill="#e6edf3" font-size="11.5">mimir has a code-symbol graph (graph/outline/peek) that THOR deliberately does NOT - for 'which functions call X'</text>
<circle cx="26" cy="1388" r="3" fill="#e3b341"/>
<text x="38" y="1392" fill="#e6edf3" font-size="11.5">Semantic mode needs a ~235 MB model + a warm embed-daemon resident (off by default; degrades cleanly to bm25)</text>
<circle cx="26" cy="1409" r="3" fill="#e3b341"/>
<text x="38" y="1413" fill="#e6edf3" font-size="11.5">Newer and far less battle-tested than mimir's daily use</text>
<circle cx="26" cy="1430" r="3" fill="#e3b341"/>
<text x="38" y="1434" fill="#e6edf3" font-size="11.5">One machine, private corpus, LLM-judged - only the drift mechanism is reproducible from this repo (examples/drift_eval.rs)</text>
