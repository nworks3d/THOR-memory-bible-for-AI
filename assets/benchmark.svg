<rect x="268" y="360" width="190.1" height="14" rx="7" fill="#22d3ee"/>
<text x="465.08" y="371.5" fill="#e6edf3" font-size="11.5" font-weight="700">58%</text>
<text x="256" y="371.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="382" fill="#e6edf3" font-size="13" font-weight="700">Code structure</text>
<text x="838" y="383" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-17%</text>
<rect x="268" y="380" width="244.9" height="14" rx="7" fill="#484f58"/>
<text x="519.86" y="391.5" fill="#8b949e" font-size="11.5">74%</text>
<text x="256" y="391.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<line x1="20" y1="410" x2="840" y2="410" stroke="#21262d" stroke-width="1"/>
<text x="20" y="428" fill="#e6edf3" font-size="13" font-weight="700">Test 1 overall  <tspan fill="#22d3ee">THOR 73.2%</tspan> vs <tspan fill="#8b949e">mimir 72.5%</tspan>  (n=200) - a TIE: 33 wins to 34, p = 1.00</text>
<text x="20" y="444" fill="#8b949e" font-size="11">133 of 200 questions score identically. Only code-structure survives a significance test (p 0.013) and it is mimir's:</text>
<text x="20" y="460" fill="#8b949e" font-size="11">it takes 12 of the 14 questions the two disagree on. The +14 on doc-reference and +7 on decision do NOT reach it</text>
<text x="20" y="476" fill="#8b949e" font-size="11">(p 0.17 and p 0.45) - read those bars as noise. The previous round published 77.0 vs 70.5 as a lead; retracted.</text>
<text x="20" y="506" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 2 - SAME KNOWLEDGE  (facts both systems verifiably hold)</text>
<text x="20" y="522" fill="#8b949e" font-size="11">cuts over the judged Test 1 medians . the equal-corpus comparison</text>
<rect x="268" y="532" width="311.2" height="14" rx="7" fill="#22d3ee"/>
<text x="586.19" y="543.5" fill="#e6edf3" font-size="11.5" font-weight="700">94%</text>
<text x="256" y="543.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="554" fill="#e6edf3" font-size="13" font-weight="700">Strict dual-written (n=53)</text>
<text x="838" y="555" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-2%</text>
<rect x="268" y="552" width="317.5" height="14" rx="7" fill="#484f58"/>
<text x="592.46" y="563.5" fill="#8b949e" font-size="11.5">96%</text>
<text x="256" y="563.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="268" y="582" width="268.0" height="14" rx="7" fill="#22d3ee"/>
<text x="542.96" y="593.5" fill="#e6edf3" font-size="11.5" font-weight="700">81%</text>
<text x="256" y="593.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="604" fill="#e6edf3" font-size="13" font-weight="700">Broad shared (n=152)</text>
<text x="838" y="605" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-3%</text>
<rect x="268" y="602" width="276.9" height="14" rx="7" fill="#484f58"/>
<text x="551.87" y="613.5" fill="#8b949e" font-size="11.5">84%</text>
<text x="256" y="613.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="632" fill="#c9d1d9" font-size="11">Both are ties with mimir nominally ahead (p 0.73 and p 0.39). The previous round published 97.2 vs 94.3 and 88.8 vs</text>
<text x="20" y="648" fill="#c9d1d9" font-size="11">86.2 and claimed THOR won both cuts - retracted. Pure ranking over an equal corpus is not a THOR advantage.</text>
<text x="20" y="678" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 3 - MULTI-PROJECT  (three private project repos)</text>
<text x="20" y="694" fill="#8b949e" font-size="11">45 questions written from each repo itself, scoped per project, top-5 full chunks, blind-judged</text>
<rect x="268" y="704" width="307.9" height="14" rx="7" fill="#22d3ee"/>
<text x="582.89" y="715.5" fill="#e6edf3" font-size="11.5" font-weight="700">93%</text>
<text x="256" y="715.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="726" fill="#e6edf3" font-size="13" font-weight="700">Project 1</text>
<text x="838" y="727" fill="#c9d1d9" font-size="15" font-weight="800" text-anchor="end">tie</text>
<rect x="268" y="724" width="307.9" height="14" rx="7" fill="#484f58"/>
<text x="582.89" y="735.5" fill="#8b949e" font-size="11.5">93%</text>
<text x="256" y="735.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="268" y="754" width="286.1" height="14" rx="7" fill="#22d3ee"/>
<text x="561.11" y="765.5" fill="#e6edf3" font-size="11.5" font-weight="700">87%</text>
<text x="256" y="765.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="776" fill="#e6edf3" font-size="13" font-weight="700">Project 2</text>
<text x="838" y="777" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-7%</text>
<rect x="268" y="774" width="307.9" height="14" rx="7" fill="#484f58"/>
<text x="582.89" y="785.5" fill="#8b949e" font-size="11.5">93%</text>
<text x="256" y="785.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="268" y="804" width="274.9" height="14" rx="7" fill="#22d3ee"/>
<text x="549.89" y="815.5" fill="#e6edf3" font-size="11.5" font-weight="700">83%</text>
<text x="256" y="815.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="826" fill="#e6edf3" font-size="13" font-weight="700">Project 3</text>
<text x="838" y="827" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-13%</text>
<rect x="268" y="824" width="319.1" height="14" rx="7" fill="#484f58"/>
<text x="594.11" y="835.5" fill="#8b949e" font-size="11.5">97%</text>
<text x="256" y="835.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<line x1="20" y1="854" x2="840" y2="854" stroke="#21262d" stroke-width="1"/>
<text x="20" y="872" fill="#e6edf3" font-size="13" font-weight="700">Test 3 overall  <tspan fill="#22d3ee">THOR 87.8%</tspan> vs <tspan fill="#8b949e">mimir 94.4%</tspan>  (n=45) - mimir ahead, p = 0.11, not significant</text>
<text x="20" y="888" fill="#8b949e" font-size="11">One question moves a 15-question project by 6.7 points, so read the split as noisy. The previous round published</text>
<text x="20" y="904" fill="#8b949e" font-size="11">96.7 vs 95.6 in THOR's favour - also retracted.</text>
<text x="20" y="934" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">SESSION DRIFT  (73 fresh-session scenarios)</text>
<text x="20" y="950" fill="#8b949e" font-size="11">post-compaction, empty context: does memory surface the fact that stops the drift? silence scores zero</text>
<rect x="268" y="960" width="221.4" height="14" rx="7" fill="#22d3ee"/>
<text x="496.43" y="971.5" fill="#e6edf3" font-size="11.5" font-weight="700">67%</text>
<text x="256" y="971.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="982" fill="#e6edf3" font-size="13" font-weight="700">Vs mimir at its best</text>
<text x="838" y="983" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-7%</text>
<rect x="268" y="980" width="244.2" height="14" rx="7" fill="#484f58"/>
<text x="519.20" y="991.5" fill="#8b949e" font-size="11.5">74%</text>
<text x="256" y="991.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir full</text>
<rect x="268" y="1010" width="221.4" height="14" rx="7" fill="#22d3ee"/>
<text x="496.43" y="1021.5" fill="#e6edf3" font-size="11.5" font-weight="700">67%</text>
<text x="256" y="1021.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="1032" fill="#e6edf3" font-size="13" font-weight="700">Vs mimir's auto hook</text>
<text x="838" y="1033" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+30%</text>
<rect x="268" y="1030" width="122.1" height="14" rx="7" fill="#484f58"/>
<text x="397.10" y="1041.5" fill="#8b949e" font-size="11.5">37%</text>
<text x="256" y="1041.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir hook</text>
<text x="20" y="1060" fill="#c9d1d9" font-size="11">Both gaps ARE significant (p 0.043 against the best channel, p below 0.0001 against the hook) and point opposite ways.</text>
<text x="20" y="1076" fill="#c9d1d9" font-size="11">The comparison splits in two and both halves are real. On CAPABILITY mimir wins: its full recall beats THOR's courier</text>
<text x="20" y="1092" fill="#c9d1d9" font-size="11">(21 wins to 9) and ties THOR's deliberate channel at 72.6%. On WHAT RUNS UNASKED THOR wins 37 to 6: mimir's hook</text>
<text x="20" y="1108" fill="#c9d1d9" font-size="11">misses 46 of 73 scenarios and returns nothing at all on 2. mimir's winning channel is not a hook - you must call it.</text>
<text x="20" y="1124" fill="#c9d1d9" font-size="11">Separately reproducible in-repo, no judge needed: cargo run --example drift_eval (catches AND false fires).</text>
<text x="20" y="1154" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">SPEED  (per-prompt cost, lower is better)</text>
<text x="20" y="1170" fill="#8b949e" font-size="11">as-deployed, correct invocation each side (THOR stdin hook, mimir prompt arg) . median of 20, warm-up discarded</text>
<rect x="268" y="1180" width="123.5" height="14" rx="7" fill="#22d3ee"/>
<text x="398.50" y="1191.5" fill="#e6edf3" font-size="11.5" font-weight="700">125 ms</text>
<text x="256" y="1191.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="1202" fill="#e6edf3" font-size="13" font-weight="700">Cost per prompt</text>
<text x="838" y="1203" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">2.7x faster</text>
<rect x="268" y="1200" width="330.0" height="14" rx="7" fill="#484f58"/>
<text x="605.00" y="1211.5" fill="#8b949e" font-size="11.5">334 ms</text>
<text x="256" y="1211.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir full</text>
<text x="20" y="1230" fill="#c9d1d9" font-size="11">THOR's courier answers EVERY prompt in 125 ms - 0 of 20 empty. mimir's hook is three times faster at 41 ms but</text>
<text x="20" y="1246" fill="#c9d1d9" font-size="11">returns nothing on 6 of 20: it is fast because it often serves nothing. The mimir channel that WINS the drift test</text>
<text x="20" y="1262" fill="#c9d1d9" font-size="11">costs 334 ms and is not a hook. That trade - always-on and adequate, versus on-demand and better - is the whole</text>
<text x="20" y="1278" fill="#c9d1d9" font-size="11">argument, and it is a judgement about how you work rather than a number this benchmark can settle.</text>
<text x="20" y="1308" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">HONEST DOWNSIDES</text>
<text x="20" y="1324" fill="#8b949e" font-size="11">where THOR does not win, and the caveats</text>
<circle cx="26" cy="1342" r="3" fill="#e3b341"/>
<text x="38" y="1346" fill="#e6edf3" font-size="11.5">THOR leads NO quality metric this round. Coverage, both same-knowledge cuts, multi-project and drift-capability are</text>
<circle cx="26" cy="1363" r="3" fill="#e3b341"/>
<text x="38" y="1367" fill="#e6edf3" font-size="11.5">all ties or mimir wins. The one defensible THOR advantage is operational: it answers every prompt and never goes silent.</text>
<circle cx="26" cy="1384" r="3" fill="#e3b341"/>
<text x="38" y="1388" fill="#e6edf3" font-size="11.5">Code-structure is a SIGNIFICANT loss (57.6 vs 74.2, p 0.013) and it widened since the last round. The symbol-graph</text>
<circle cx="26" cy="1405" r="3" fill="#e3b341"/>
<text x="38" y="1409" fill="#e6edf3" font-size="11.5">explanation we published for it did not survive scrutiny and has not been re-tested, so the cause is still unknown.</text>
<circle cx="26" cy="1426" r="3" fill="#e3b341"/>
<text x="38" y="1430" fill="#e6edf3" font-size="11.5">An earlier version of THIS round measured drift against mimir's hook only and reported THOR winning 3x. That gave</text>
<circle cx="26" cy="1447" r="3" fill="#e3b341"/>
<text x="38" y="1451" fill="#e6edf3" font-size="11.5">mimir its weakest channel; the run was discarded before publication and is recorded here rather than quietly dropped.</text>
<circle cx="26" cy="1468" r="3" fill="#e3b341"/>
<text x="38" y="1472" fill="#e6edf3" font-size="11.5">Do not compare absolutes across rounds: THOR's courier reads 67.1% here against 86.3% last round, while an A/B</text>
<circle cx="26" cy="1489" r="3" fill="#e3b341"/>
<text x="38" y="1493" fill="#e6edf3" font-size="11.5">against the previous release proved its drift output is byte-identical. The code did not change; the jury did.</text>
<circle cx="26" cy="1510" r="3" fill="#e3b341"/>
<text x="38" y="1514" fill="#e6edf3" font-size="11.5">THOR is compute-bound; cold latency grows with store size. The resident cache removes that only while a daemon is up.</text>
<circle cx="26" cy="1531" r="3" fill="#e3b341"/>
<text x="38" y="1535" fill="#e6edf3" font-size="11.5">Newer and far less battle-tested than mimir's daily use; mimir ships at a high cadence (v0.15: inference delegation).</text>
<circle cx="26" cy="1552" r="3" fill="#e3b341"/>
<text x="38" y="1556" fill="#e6edf3" font-size="11.5">One machine, private corpus, LLM-judged - only drift is repo-reproducible (examples/drift_eval.rs).</text>
<line x1="20" y1="1585" x2="840" y2="1585" stroke="#21262d" stroke-width="1"/>
<text x="20" y="1605" fill="#e6edf3" font-size="13.5" font-weight="700">Bottom line <tspan fill="#8b949e">quality is a tie, and mimir wins code-structure and drift-capability outright</tspan></text>
<text x="20" y="1625" fill="#e6edf3" font-size="13.5" font-weight="700"><tspan fill="#22d3ee">THOR's claim is what runs unasked: every prompt, 125 ms, never silent</tspan> . <tspan fill="#e3b341">mimir does better when asked</tspan></text>
</svg>
