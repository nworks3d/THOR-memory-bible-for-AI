<text x="20" y="1198" fill="#c9d1d9" font-size="11">Old '1.5x faster / 2.1x fewer tokens' headline does not hold on this round's sample and is retired.</text>
<text x="20" y="1228" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">HONEST DOWNSIDES</text>
