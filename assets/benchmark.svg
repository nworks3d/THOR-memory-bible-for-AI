<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 1657" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
<rect x="0" y="0" width="860" height="1657" rx="10" fill="#0d1117"/>
<text x="20" y="32" fill="#e6edf3" font-size="22" font-weight="800">THOR vs mimir - the honest picture</text>
<text x="20" y="54" fill="#8b949e" font-size="12">Same machine, blind-judged, re-measured fresh 2026-07-21 vs mimir v0.15.0. Sign test on per-question wins.</text>
<text x="20" y="84" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 1 - COVERAGE  (200 questions: shared-knowledge + category-stratified)</text>
<text x="20" y="100" fill="#8b949e" font-size="11">deliberate recall over the live store . higher is better . only ONE gap here is statistically real</text>
