<text x="838" y="1137" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+8%</text>
<rect x="196" y="1134" width="158.1" height="14" rx="7" fill="#484f58"/>
<text x="361.07" y="1145.5" fill="#8b949e" font-size="11.5">48%</text>
<text x="184" y="1145.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="1164" fill="#c9d1d9" font-size="11">THOR's best drift numbers to date, judged THREE-WAY BLIND for the first time (courier / deliberate / mimir shuffled</text>
<text x="20" y="1180" fill="#c9d1d9" font-size="11">onto anonymous sides in one jury pass). The as-deployed courier now also beats THOR's own deliberate recall</text>
<text x="20" y="1196" fill="#c9d1d9" font-size="11">(62.5 / 48.6) - author-declared bilingual fires-when triggers fire on task prompts score-only ranking misses.</text>
<text x="20" y="1212" fill="#c9d1d9" font-size="11">Pins + file/command guards cover the rest by construction: cargo run --example drift_eval, reproducible in-repo.</text>
<text x="20" y="1242" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">SPEED AND TOKENS  (per-prompt cost, lower is better)</text>
<text x="20" y="1258" fill="#8b949e" font-size="11">THOR cold vs mimir's as-deployed cold path, median of 20, canonical fixed 20-prompt set</text>
<rect x="196" y="1268" width="117.5" height="14" rx="7" fill="#22d3ee"/>
<text x="320.52" y="1279.5" fill="#e6edf3" font-size="11.5" font-weight="700">207 ms</text>
<text x="184" y="1279.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="1290" fill="#e6edf3" font-size="13" font-weight="700">Latency (as-deployed)</text>
<text x="838" y="1291" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">2.8x faster</text>
<rect x="196" y="1288" width="330.0" height="14" rx="7" fill="#484f58"/>
<text x="533.00" y="1299.5" fill="#8b949e" font-size="11.5">581 ms</text>
<text x="184" y="1299.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="1318" width="330.0" height="14" rx="7" fill="#22d3ee"/>
<text x="533.00" y="1329.5" fill="#e6edf3" font-size="11.5" font-weight="700">784</text>
<text x="184" y="1329.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="1340" fill="#e6edf3" font-size="13" font-weight="700">Tokens injected</text>
<text x="838" y="1341" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">3.3x MORE (not fewer)</text>
<rect x="196" y="1338" width="99.8" height="14" rx="7" fill="#484f58"/>
<text x="302.76" y="1349.5" fill="#8b949e" font-size="11.5">237</text>
<text x="184" y="1349.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="1368" fill="#c9d1d9" font-size="11">NEW: THOR's own opt-in warm inject daemon (idea credit mimir) serves the provably IDENTICAL decision at 192.7 ms.</text>
<text x="20" y="1384" fill="#c9d1d9" font-size="11">mimir's opt-in warm daemon stays the fastest channel outright - 38.9 ms, ~32 tokens - but served NOTHING on 10 of</text>
<text x="20" y="1400" fill="#c9d1d9" font-size="11">the 20 prompts (single floor-gated memory): faster and cheaper because it serves less. THOR's cold median is back</text>
<text x="20" y="1416" fill="#c9d1d9" font-size="11">under its own 250 ms guardrail (253 -> 206.8 ms). Old '1.5x faster / 2.1x fewer tokens' headline stays retired.</text>
<text x="20" y="1446" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">HONEST DOWNSIDES</text>
<text x="20" y="1462" fill="#8b949e" font-size="11">where THOR does not win, and the caveats</text>
<circle cx="26" cy="1480" r="3" fill="#e3b341"/>
<text x="38" y="1484" fill="#e6edf3" font-size="11.5">Test 1 overall is a tie now, not a THOR lead - and the movement was asymmetric (THOR down, mimir up, same corpus)</text>
<circle cx="26" cy="1501" r="3" fill="#e3b341"/>
<text x="38" y="1505" fill="#e6edf3" font-size="11.5">Code-structure: level but not won (54.5 vs 56.1 re-judged; 60.3-60.3 excl. dead sources) - 70% target unmet</text>
<circle cx="26" cy="1522" r="3" fill="#e3b341"/>
<text x="38" y="1526" fill="#e6edf3" font-size="11.5">mimir wins the broad shared cut (81.2% vs 77.0%) - two-thirds code questions, same weakness on an equal corpus</text>
<circle cx="26" cy="1543" r="3" fill="#e3b341"/>
<text x="38" y="1547" fill="#e6edf3" font-size="11.5">The 80%-everywhere goal still does not stand: 0 of 8 v4 gates (config how-to closest at 79.4%, drift surfaced 72.1%)</text>
<circle cx="26" cy="1564" r="3" fill="#e3b341"/>
<text x="38" y="1568" fill="#e6edf3" font-size="11.5">mimir's warm daemon stays fastest outright (38.9 vs 192.7 ms warm); THOR injects ~3.3x more tokens than mimir cold</text>
<circle cx="26" cy="1585" r="3" fill="#e3b341"/>
<text x="38" y="1589" fill="#e6edf3" font-size="11.5">Three drift golds stay honest misses (deep drift, zero shared vocabulary) - left as gaps, not trigger-stuffed</text>
<circle cx="26" cy="1606" r="3" fill="#e3b341"/>
<text x="38" y="1610" fill="#e6edf3" font-size="11.5">mimir has a code-symbol graph (graph/outline/peek) that THOR deliberately does NOT - for 'which functions call X'</text>
<circle cx="26" cy="1627" r="3" fill="#e3b341"/>
<text x="38" y="1631" fill="#e6edf3" font-size="11.5">Semantic mode needs a ~235 MB model + a warm embed-daemon resident (off by default; degrades cleanly to bm25)</text>
<circle cx="26" cy="1648" r="3" fill="#e3b341"/>
<text x="38" y="1652" fill="#e6edf3" font-size="11.5">Newer and far less battle-tested than mimir's daily use</text>
<circle cx="26" cy="1669" r="3" fill="#e3b341"/>
<text x="38" y="1673" fill="#e6edf3" font-size="11.5">One machine, private corpus, LLM-judged - only drift is repo-reproducible (examples/drift_eval.rs)</text>
