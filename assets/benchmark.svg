<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 1425" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
<rect x="0" y="0" width="860" height="1425" rx="10" fill="#0d1117"/>
<text x="20" y="32" fill="#e6edf3" font-size="22" font-weight="800">THOR vs mimir - the honest picture</text>
<text x="20" y="54" fill="#8b949e" font-size="12">Same machine, blind-judged, every number re-measured fresh 2026-07-10 after the v3 round (independent jury, level playing field). Wins and losses.</text>
<text x="20" y="84" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 1 - COVERAGE  (200 questions: 118 shared-knowledge + 82 stratified)</text>
<text x="20" y="100" fill="#8b949e" font-size="11">deliberate recall over the live store . higher is better</text>
<rect x="196" y="110" width="169.9" height="14" rx="7" fill="#22d3ee"/>
<text x="372.95" y="121.5" fill="#e6edf3" font-size="11.5" font-weight="700">52%</text>
<text x="184" y="121.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="132" fill="#e6edf3" font-size="13" font-weight="700">Code structure</text>
<text x="838" y="133" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+6%</text>
<rect x="196" y="130" width="150.2" height="14" rx="7" fill="#484f58"/>
<text x="353.15" y="141.5" fill="#8b949e" font-size="11.5">46%</text>
<text x="184" y="141.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="160" width="228.4" height="14" rx="7" fill="#22d3ee"/>
<text x="431.36" y="171.5" fill="#e6edf3" font-size="11.5" font-weight="700">69%</text>
<text x="184" y="171.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="182" fill="#e6edf3" font-size="13" font-weight="700">Code behavior</text>
<text x="838" y="183" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+19%</text>
<rect x="196" y="180" width="165.0" height="14" rx="7" fill="#484f58"/>
<text x="368.00" y="191.5" fill="#8b949e" font-size="11.5">50%</text>
<text x="184" y="191.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="210" width="231.0" height="14" rx="7" fill="#22d3ee"/>
<text x="434.00" y="221.5" fill="#e6edf3" font-size="11.5" font-weight="700">70%</text>
<text x="184" y="221.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="232" fill="#e6edf3" font-size="13" font-weight="700">Doc reference</text>
<text x="838" y="233" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+10%</text>
<rect x="196" y="230" width="198.0" height="14" rx="7" fill="#484f58"/>
<text x="401.00" y="241.5" fill="#8b949e" font-size="11.5">60%</text>
<text x="184" y="241.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="260" width="242.5" height="14" rx="7" fill="#22d3ee"/>
<text x="445.55" y="271.5" fill="#e6edf3" font-size="11.5" font-weight="700">74%</text>
<text x="184" y="271.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="282" fill="#e6edf3" font-size="13" font-weight="700">Config how-to</text>
<text x="838" y="283" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-3%</text>
<rect x="196" y="280" width="252.4" height="14" rx="7" fill="#484f58"/>
<text x="455.45" y="291.5" fill="#8b949e" font-size="11.5">76%</text>
<text x="184" y="291.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="310" width="236.6" height="14" rx="7" fill="#22d3ee"/>
<text x="439.61" y="321.5" fill="#e6edf3" font-size="11.5" font-weight="700">72%</text>
<text x="184" y="321.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="332" fill="#e6edf3" font-size="13" font-weight="700">Gotcha</text>
<text x="838" y="333" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-2%</text>
<rect x="196" y="330" width="243.9" height="14" rx="7" fill="#484f58"/>
<text x="446.87" y="341.5" fill="#8b949e" font-size="11.5">74%</text>
<text x="184" y="341.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="360" width="226.0" height="14" rx="7" fill="#22d3ee"/>
<text x="429.05" y="371.5" fill="#e6edf3" font-size="11.5" font-weight="700">68%</text>
<text x="184" y="371.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="382" fill="#e6edf3" font-size="13" font-weight="700">Decision</text>
<text x="838" y="383" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+11%</text>
<rect x="196" y="380" width="189.4" height="14" rx="7" fill="#484f58"/>
<text x="392.42" y="391.5" fill="#8b949e" font-size="11.5">57%</text>
<text x="184" y="391.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<line x1="20" y1="410" x2="840" y2="410" stroke="#21262d" stroke-width="1"/>
<text x="20" y="428" fill="#e6edf3" font-size="13" font-weight="700">Test 1 overall  <tspan fill="#22d3ee">THOR 67%</tspan> vs <tspan fill="#8b949e">mimir 57%</tspan>  (n=200)</text>
<text x="20" y="444" fill="#8b949e" font-size="11">Balanced set (the earlier 504-question run was dominated by code-only questions, where the gap was far larger).</text>
<text x="20" y="474" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 2 - SAME KNOWLEDGE  (118 facts both systems have)</text>
<text x="20" y="490" fill="#8b949e" font-size="11">pure retrieval quality on an equal corpus . the fair, apples-to-apples comparison</text>
<rect x="196" y="500" width="202.6" height="14" rx="7" fill="#22d3ee"/>
<text x="405.62" y="511.5" fill="#e6edf3" font-size="11.5" font-weight="700">61%</text>
<text x="184" y="511.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="522" fill="#e6edf3" font-size="13" font-weight="700">Answer present</text>
<text x="838" y="523" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+8%</text>
<rect x="196" y="520" width="177.5" height="14" rx="7" fill="#484f58"/>
<text x="380.54" y="531.5" fill="#8b949e" font-size="11.5">54%</text>
<text x="184" y="531.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="550" fill="#c9d1d9" font-size="11">THOR leads the broad shared set by +8%; mimir keeps the strictest dual-written-only cut (n=53), now 94% vs 92% - the gap</text>
<text x="20" y="566" fill="#c9d1d9" font-size="11">narrowed from 7 points to 3 across two same-day juries.</text>
<text x="20" y="596" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 3 - MULTI-PROJECT  (three private project repos seeded)</text>
<text x="20" y="612" fill="#8b949e" font-size="11">45 real questions from each repo, scoped per project, blind-judged by 3 . top-5 full chunks</text>
<rect x="196" y="622" width="297.0" height="14" rx="7" fill="#22d3ee"/>
<text x="500.00" y="633.5" fill="#e6edf3" font-size="11.5" font-weight="700">90%</text>
<text x="184" y="633.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="644" fill="#e6edf3" font-size="13" font-weight="700">Project 1</text>
<text x="838" y="645" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-7%</text>
<rect x="196" y="642" width="319.1" height="14" rx="7" fill="#484f58"/>
<text x="522.11" y="653.5" fill="#8b949e" font-size="11.5">97%</text>
<text x="184" y="653.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="672" width="319.1" height="14" rx="7" fill="#22d3ee"/>
<text x="522.11" y="683.5" fill="#e6edf3" font-size="11.5" font-weight="700">97%</text>
<text x="184" y="683.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="694" fill="#e6edf3" font-size="13" font-weight="700">Project 2</text>
<text x="838" y="695" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+3%</text>
<rect x="196" y="692" width="307.9" height="14" rx="7" fill="#484f58"/>
<text x="510.89" y="703.5" fill="#8b949e" font-size="11.5">93%</text>
<text x="184" y="703.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="722" width="307.9" height="14" rx="7" fill="#22d3ee"/>
<text x="510.89" y="733.5" fill="#e6edf3" font-size="11.5" font-weight="700">93%</text>
<text x="184" y="733.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="744" fill="#e6edf3" font-size="13" font-weight="700">Project 3</text>
<text x="838" y="745" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+17%</text>
<rect x="196" y="742" width="253.1" height="14" rx="7" fill="#484f58"/>
<text x="456.11" y="753.5" fill="#8b949e" font-size="11.5">77%</text>
<text x="184" y="753.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<line x1="20" y1="772" x2="840" y2="772" stroke="#21262d" stroke-width="1"/>
<text x="20" y="790" fill="#e6edf3" font-size="13" font-weight="700">Test 3 overall  <tspan fill="#22d3ee">THOR 93%</tspan> vs <tspan fill="#8b949e">mimir 89%</tspan>  (n=45)</text>
<text x="20" y="806" fill="#8b949e" font-size="11">Level playing field: mimir was GIVEN the docs of Project 2 before this run (it scored 0% by absence earlier).</text>
<text x="20" y="822" fill="#8b949e" font-size="11">mimir still edges Project 1 on curated docs (97 vs 90); THOR wins the other two.</text>
<text x="20" y="852" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">SESSION DRIFT COMPENSATION  (73 fresh-session scenarios)</text>
<text x="20" y="868" fill="#8b949e" font-size="11">post-compaction, empty context: does the AS-DEPLOYED auto-injection surface the fact that stops the drift?</text>
<rect x="196" y="878" width="217.1" height="14" rx="7" fill="#22d3ee"/>
<text x="420.14" y="889.5" fill="#e6edf3" font-size="11.5" font-weight="700">66%</text>
<text x="184" y="889.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="900" fill="#e6edf3" font-size="13" font-weight="700">Preventer surfaced</text>
<text x="838" y="901" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+12%</text>
<rect x="196" y="898" width="176.2" height="14" rx="7" fill="#484f58"/>
<text x="379.22" y="909.5" fill="#8b949e" font-size="11.5">53%</text>
<text x="184" y="909.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="928" width="149.2" height="14" rx="7" fill="#22d3ee"/>
<text x="352.16" y="939.5" fill="#e6edf3" font-size="11.5" font-weight="700">45%</text>
<text x="184" y="939.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="950" fill="#e6edf3" font-size="13" font-weight="700">Clear catch (full)</text>
<text x="838" y="951" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+4%</text>
<rect x="196" y="948" width="135.6" height="14" rx="7" fill="#484f58"/>
<text x="338.63" y="959.5" fill="#8b949e" font-size="11.5">41%</text>
<text x="184" y="959.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="978" fill="#c9d1d9" font-size="11">One round earlier the courier caught only 19% - density-chosen snippets, a wide slot 1, store hygiene and a</text>
<text x="20" y="994" fill="#c9d1d9" font-size="11">harness fix turned it into a win on both metrics. Pins + file/command guards cover the rest by construction</text>
<text x="20" y="1010" fill="#c9d1d9" font-size="11">(14/14 surfaced on the committed corpus): cargo run --example drift_eval, reproducible in-repo.</text>
<text x="20" y="1040" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">SPEED AND TOKENS  (per-prompt cost, lower is better)</text>
<text x="20" y="1056" fill="#8b949e" font-size="11">warm daemon, median of 20, same long task prompts for both systems</text>
<rect x="196" y="1066" width="218.7" height="14" rx="7" fill="#22d3ee"/>
<text x="421.66" y="1077.5" fill="#e6edf3" font-size="11.5" font-weight="700">163 ms</text>
<text x="184" y="1077.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="1088" fill="#e6edf3" font-size="13" font-weight="700">Latency (warm)</text>
<text x="838" y="1089" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">1.5x faster</text>
<rect x="196" y="1086" width="330.0" height="14" rx="7" fill="#484f58"/>
<text x="533.00" y="1097.5" fill="#8b949e" font-size="11.5">246 ms</text>
<text x="184" y="1097.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="1116" width="159.0" height="14" rx="7" fill="#22d3ee"/>
<text x="361.97" y="1127.5" fill="#e6edf3" font-size="11.5" font-weight="700">435</text>
<text x="184" y="1127.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="1138" fill="#e6edf3" font-size="13" font-weight="700">Tokens injected</text>
<text x="838" y="1139" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">2.1x fewer</text>
<rect x="196" y="1136" width="330.0" height="14" rx="7" fill="#484f58"/>
<text x="533.00" y="1147.5" fill="#8b949e" font-size="11.5">903</text>
<text x="184" y="1147.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="1180" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">HONEST DOWNSIDES</text>
<text x="20" y="1196" fill="#8b949e" font-size="11">where THOR does not win, and the caveats</text>
<circle cx="26" cy="1214" r="3" fill="#e3b341"/>
<text x="38" y="1218" fill="#e6edf3" font-size="11.5">On the strictest same-knowledge cut (dual-written memories, n=53) mimir leads 94% vs 92% - pure memory recall is its home turf</text>
<circle cx="26" cy="1235" r="3" fill="#e3b341"/>
<text x="38" y="1239" fill="#e6edf3" font-size="11.5">Jury strictness moves absolute numbers between runs: THOR's dual-written score swung 82-92% across four fresh juries</text>
<circle cx="26" cy="1256" r="3" fill="#e3b341"/>
<text x="38" y="1260" fill="#e6edf3" font-size="11.5">Curated docs can beat raw ingest: on one project's design questions mimir's hand-written doc collection scored 97% vs 90%; it also edges the gotcha and config categories</text>
<circle cx="26" cy="1277" r="3" fill="#e3b341"/>
<text x="38" y="1281" fill="#e6edf3" font-size="11.5">mimir has a code-symbol graph (graph/outline/peek) that THOR deliberately does NOT - for 'which functions call X'</text>
<circle cx="26" cy="1298" r="3" fill="#e3b341"/>
<text x="38" y="1302" fill="#e6edf3" font-size="11.5">Semantic mode needs a ~235 MB model + a ~570 MB warm daemon (off by default; degrades cleanly to bm25)</text>
<circle cx="26" cy="1319" r="3" fill="#e3b341"/>
<text x="38" y="1323" fill="#e6edf3" font-size="11.5">Newer and far less battle-tested than mimir's daily use</text>
<circle cx="26" cy="1340" r="3" fill="#e3b341"/>
<text x="38" y="1344" fill="#e6edf3" font-size="11.5">One machine, private corpus, LLM-judged - only the drift mechanism is reproducible from this repo (examples/drift_eval.rs)</text>
<line x1="20" y1="1373" x2="840" y2="1373" stroke="#21262d" stroke-width="1"/>
<text x="20" y="1393" fill="#e6edf3" font-size="13.5" font-weight="700">Bottom line  <tspan fill="#22d3ee">coverage 67% vs 57%</tspan>  .  <tspan fill="#c9d1d9">same-knowledge 61% vs 54%</tspan>  .  <tspan fill="#c9d1d9">multi-project 93% vs 89%</tspan>  .  <tspan fill="#22d3ee">drift surfaced 66% vs 53%, 1.5x faster</tspan></text>
</svg>
