<text x="20" y="1230" fill="#c9d1d9" font-size="11">Old '1.5x faster / 2.1x fewer tokens' headline stays retired. THOR's 253 ms median is marginally over its own 250 ms guardrail.</text>
<text x="20" y="1260" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">HONEST DOWNSIDES</text>
