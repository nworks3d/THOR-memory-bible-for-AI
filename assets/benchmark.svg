<circle cx="26" cy="1294" r="3" fill="#e3b341"/>
<text x="38" y="1298" fill="#e6edf3" font-size="11.5">mimir leads the multi-project test outright, 98.9% vs 92.2% - its code-content indexing erased THOR's biggest structural edge; THOR wins no project outright</text>
<circle cx="26" cy="1315" r="3" fill="#e3b341"/>
<text x="38" y="1319" fill="#e6edf3" font-size="11.5">mimir keeps code-structure on Test 1, 58% vs 50% - THOR's new symbol-boundary chunker landed but did not measurably lift the judged score</text>
<circle cx="26" cy="1336" r="3" fill="#e3b341"/>
<text x="38" y="1340" fill="#e6edf3" font-size="11.5">The v4 80% goal round closed at 0 of 8 gates on this stricter run (config-how-to slipped from 85.3% to 79.4%)</text>
<circle cx="26" cy="1357" r="3" fill="#e3b341"/>
<text x="38" y="1361" fill="#e6edf3" font-size="11.5">mimir's opt-in warm daemon beats THOR's latency (62 ms vs 253 ms), and THOR injects more tokens than mimir's cold path (679 vs 236), not fewer</text>
<circle cx="26" cy="1378" r="3" fill="#e3b341"/>
<text x="38" y="1382" fill="#e6edf3" font-size="11.5">THOR's courier median (253 ms) is marginally over its own 250 ms latency guardrail (symbol chunking on the freshness path)</text>
<circle cx="26" cy="1399" r="3" fill="#e3b341"/>
<text x="38" y="1403" fill="#e6edf3" font-size="11.5">Same-knowledge (Test 2) not re-measured this round; previous round mimir led the strictest dual-written cut (n=53), 94% vs 92% - pure memory recall is its home turf</text>
<circle cx="26" cy="1420" r="3" fill="#e3b341"/>
<text x="38" y="1424" fill="#e6edf3" font-size="11.5">mimir has a code-symbol graph (graph/outline/peek) that THOR deliberately does NOT - for 'which functions call X'</text>
<circle cx="26" cy="1441" r="3" fill="#e3b341"/>
<text x="38" y="1445" fill="#e6edf3" font-size="11.5">Semantic mode needs a ~235 MB model + a warm embed-daemon resident (off by default; degrades cleanly to bm25)</text>
<circle cx="26" cy="1462" r="3" fill="#e3b341"/>
<text x="38" y="1466" fill="#e6edf3" font-size="11.5">Newer and far less battle-tested than mimir's daily use</text>
<circle cx="26" cy="1483" r="3" fill="#e3b341"/>
<text x="38" y="1487" fill="#e6edf3" font-size="11.5">One machine, private corpus, LLM-judged - only the drift mechanism is reproducible from this repo (examples/drift_eval.rs)</text>
