<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 1409" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
<rect x="0" y="0" width="860" height="1409" rx="10" fill="#0d1117"/>
<text x="20" y="32" fill="#e6edf3" font-size="22" font-weight="800">THOR vs mimir - the honest picture</text>
<text x="20" y="54" fill="#8b949e" font-size="12">Same machine, blind-judged, every number re-measured fresh 2026-07-09 (independent jury). Wins and losses.</text>
<text x="20" y="84" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 1 - COVERAGE  (200 questions: 118 shared-knowledge + 82 stratified)</text>
<text x="20" y="100" fill="#8b949e" font-size="11">deliberate recall over the live store . higher is better</text>
<rect x="196" y="110" width="174.9" height="14" rx="7" fill="#22d3ee"/>
<text x="377.90" y="121.5" fill="#e6edf3" font-size="11.5" font-weight="700">53%</text>
<text x="184" y="121.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="132" fill="#e6edf3" font-size="13" font-weight="700">Code structure</text>
<text x="838" y="133" fill="#c9d1d9" font-size="15" font-weight="800" text-anchor="end">tie</text>
<rect x="196" y="130" width="174.9" height="14" rx="7" fill="#484f58"/>
<text x="377.90" y="141.5" fill="#8b949e" font-size="11.5">53%</text>
<text x="184" y="141.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="160" width="233.6" height="14" rx="7" fill="#22d3ee"/>
<text x="436.64" y="171.5" fill="#e6edf3" font-size="11.5" font-weight="700">71%</text>
<text x="184" y="171.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="182" fill="#e6edf3" font-size="13" font-weight="700">Code behavior</text>
<text x="838" y="183" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+18%</text>
<rect x="196" y="180" width="175.9" height="14" rx="7" fill="#484f58"/>
<text x="378.89" y="191.5" fill="#8b949e" font-size="11.5">53%</text>
<text x="184" y="191.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="210" width="214.5" height="14" rx="7" fill="#22d3ee"/>
<text x="417.50" y="221.5" fill="#e6edf3" font-size="11.5" font-weight="700">65%</text>
<text x="184" y="221.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="232" fill="#e6edf3" font-size="13" font-weight="700">Doc reference</text>
<text x="838" y="233" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+11%</text>
<rect x="196" y="230" width="177.5" height="14" rx="7" fill="#484f58"/>
<text x="380.54" y="241.5" fill="#8b949e" font-size="11.5">54%</text>
<text x="184" y="241.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="260" width="271.9" height="14" rx="7" fill="#22d3ee"/>
<text x="474.92" y="271.5" fill="#e6edf3" font-size="11.5" font-weight="700">82%</text>
<text x="184" y="271.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="282" fill="#e6edf3" font-size="13" font-weight="700">Config how-to</text>
<text x="838" y="283" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+6%</text>
<rect x="196" y="280" width="252.4" height="14" rx="7" fill="#484f58"/>
<text x="455.45" y="291.5" fill="#8b949e" font-size="11.5">76%</text>
<text x="184" y="291.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="310" width="229.7" height="14" rx="7" fill="#22d3ee"/>
<text x="432.68" y="321.5" fill="#e6edf3" font-size="11.5" font-weight="700">70%</text>
<text x="184" y="321.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="332" fill="#e6edf3" font-size="13" font-weight="700">Gotcha</text>
<text x="838" y="333" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-2%</text>
<rect x="196" y="330" width="236.6" height="14" rx="7" fill="#484f58"/>
<text x="439.61" y="341.5" fill="#8b949e" font-size="11.5">72%</text>
<text x="184" y="341.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="360" width="238.3" height="14" rx="7" fill="#22d3ee"/>
<text x="441.26" y="371.5" fill="#e6edf3" font-size="11.5" font-weight="700">72%</text>
<text x="184" y="371.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="382" fill="#e6edf3" font-size="13" font-weight="700">Decision</text>
<text x="838" y="383" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+11%</text>
<rect x="196" y="380" width="201.6" height="14" rx="7" fill="#484f58"/>
<text x="404.63" y="391.5" fill="#8b949e" font-size="11.5">61%</text>
<text x="184" y="391.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<line x1="20" y1="410" x2="840" y2="410" stroke="#21262d" stroke-width="1"/>
<text x="20" y="428" fill="#e6edf3" font-size="13" font-weight="700">Test 1 overall  <tspan fill="#22d3ee">THOR 68%</tspan> vs <tspan fill="#8b949e">mimir 59%</tspan>  (n=200)</text>
<text x="20" y="444" fill="#8b949e" font-size="11">Balanced set (the earlier 504-question run was dominated by code-only questions, where the gap was far larger).</text>
<text x="20" y="474" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 2 - SAME KNOWLEDGE  (118 facts both systems have)</text>
<text x="20" y="490" fill="#8b949e" font-size="11">pure retrieval quality on an equal corpus . the fair, apples-to-apples comparison</text>
<rect x="196" y="500" width="213.8" height="14" rx="7" fill="#22d3ee"/>
<text x="416.84" y="511.5" fill="#e6edf3" font-size="11.5" font-weight="700">65%</text>
<text x="184" y="511.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="522" fill="#e6edf3" font-size="13" font-weight="700">Answer present</text>
<text x="838" y="523" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+8%</text>
<rect x="196" y="520" width="187.4" height="14" rx="7" fill="#484f58"/>
<text x="390.44" y="531.5" fill="#8b949e" font-size="11.5">57%</text>
<text x="184" y="531.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="550" fill="#c9d1d9" font-size="11">THOR leads the broad shared set by +8%, but mimir wins the strictest dual-written-only cut (n=53): mimir 94% vs THOR 91%</text>
<text x="20" y="580" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 3 - MULTI-PROJECT  (three private project repos seeded)</text>
<text x="20" y="596" fill="#8b949e" font-size="11">45 real questions from each repo, scoped per project, blind-judged by 3 . top-5 full chunks</text>
<rect x="196" y="606" width="286.1" height="14" rx="7" fill="#22d3ee"/>
<text x="489.11" y="617.5" fill="#e6edf3" font-size="11.5" font-weight="700">87%</text>
<text x="184" y="617.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="628" fill="#e6edf3" font-size="13" font-weight="700">Project 1</text>
<text x="838" y="629" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-10%</text>
<rect x="196" y="626" width="319.1" height="14" rx="7" fill="#484f58"/>
<text x="522.11" y="637.5" fill="#8b949e" font-size="11.5">97%</text>
<text x="184" y="637.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="656" width="330.0" height="14" rx="7" fill="#22d3ee"/>
<text x="533.00" y="667.5" fill="#e6edf3" font-size="11.5" font-weight="700">100%</text>
<text x="184" y="667.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="678" fill="#e6edf3" font-size="13" font-weight="700">Project 2</text>
<text x="838" y="679" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+100%</text>
<rect x="196" y="676" width="0.0" height="14" rx="7" fill="#484f58"/>
<text x="203.00" y="687.5" fill="#8b949e" font-size="11.5">0%</text>
<text x="184" y="687.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="706" width="319.1" height="14" rx="7" fill="#22d3ee"/>
<text x="522.11" y="717.5" fill="#e6edf3" font-size="11.5" font-weight="700">97%</text>
<text x="184" y="717.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="728" fill="#e6edf3" font-size="13" font-weight="700">Project 3</text>
<text x="838" y="729" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+17%</text>
<rect x="196" y="726" width="264.0" height="14" rx="7" fill="#484f58"/>
<text x="467.00" y="737.5" fill="#8b949e" font-size="11.5">80%</text>
<text x="184" y="737.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<line x1="20" y1="756" x2="840" y2="756" stroke="#21262d" stroke-width="1"/>
<text x="20" y="774" fill="#e6edf3" font-size="13" font-weight="700">Test 3 overall  <tspan fill="#22d3ee">THOR 94%</tspan> vs <tspan fill="#8b949e">mimir 59%</tspan>  (n=45)</text>
<text x="20" y="790" fill="#8b949e" font-size="11">mimir still wins Project 1 on its hand-curated design docs (gap closed from 26 to 10 points after the ranking round);</text>
<text x="20" y="806" fill="#8b949e" font-size="11">THOR wins where it uniquely holds the code. Project 2 has no mimir doc collection at all.</text>
<text x="20" y="836" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">SESSION DRIFT COMPENSATION  (73 fresh-session scenarios, prompt-association only)</text>
<text x="20" y="852" fill="#8b949e" font-size="11">post-compaction, empty context: does recall surface the fact that stops the drift? THOR = deliberate recall</text>
<rect x="196" y="862" width="199.0" height="14" rx="7" fill="#22d3ee"/>
<text x="401.99" y="873.5" fill="#e6edf3" font-size="11.5" font-weight="700">60%</text>
<text x="184" y="873.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="884" fill="#e6edf3" font-size="13" font-weight="700">Preventer surfaced</text>
<text x="838" y="885" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+7%</text>
<rect x="196" y="882" width="176.2" height="14" rx="7" fill="#484f58"/>
<text x="379.22" y="893.5" fill="#8b949e" font-size="11.5">53%</text>
<text x="184" y="893.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="912" width="131.0" height="14" rx="7" fill="#22d3ee"/>
<text x="334.01" y="923.5" fill="#e6edf3" font-size="11.5" font-weight="700">40%</text>
<text x="184" y="923.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="934" fill="#e6edf3" font-size="13" font-weight="700">Clear catch (full)</text>
<text x="838" y="935" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-4%</text>
<rect x="196" y="932" width="144.5" height="14" rx="7" fill="#484f58"/>
<text x="347.54" y="943.5" fill="#8b949e" font-size="11.5">44%</text>
<text x="184" y="943.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="962" fill="#c9d1d9" font-size="11">As-deployed courier scores lower (51% / 19%): its noise gates filter weakly-associated preventers. THOR's real</text>
<text x="20" y="978" fill="#c9d1d9" font-size="11">drift answer is structural - pinned rules re-inject after every compaction and the file-touch guard fires at the</text>
<text x="20" y="994" fill="#c9d1d9" font-size="11">moment of action (8/8 on the committed corpus): cargo run --example drift_eval, reproducible in-repo.</text>
<text x="20" y="1024" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">SPEED AND TOKENS  (per-prompt cost, lower is better)</text>
<text x="20" y="1040" fill="#8b949e" font-size="11">warm daemon, median of 20, same long task prompts for both systems</text>
<rect x="196" y="1050" width="175.1" height="14" rx="7" fill="#22d3ee"/>
<text x="378.13" y="1061.5" fill="#e6edf3" font-size="11.5" font-weight="700">268 ms</text>
<text x="184" y="1061.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="1072" fill="#e6edf3" font-size="13" font-weight="700">Latency (warm)</text>
<text x="838" y="1073" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">1.9x faster</text>
<rect x="196" y="1070" width="330.0" height="14" rx="7" fill="#484f58"/>
<text x="533.00" y="1081.5" fill="#8b949e" font-size="11.5">505 ms</text>
<text x="184" y="1081.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="1100" width="137.1" height="14" rx="7" fill="#22d3ee"/>
<text x="340.08" y="1111.5" fill="#e6edf3" font-size="11.5" font-weight="700">351</text>
<text x="184" y="1111.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="1122" fill="#e6edf3" font-size="13" font-weight="700">Tokens injected</text>
<text x="838" y="1123" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">2.4x fewer</text>
<rect x="196" y="1120" width="330.0" height="14" rx="7" fill="#484f58"/>
<text x="533.00" y="1131.5" fill="#8b949e" font-size="11.5">845</text>
<text x="184" y="1131.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="1164" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">HONEST DOWNSIDES</text>
<text x="20" y="1180" fill="#8b949e" font-size="11">where THOR does not win, and the caveats</text>
<circle cx="26" cy="1198" r="3" fill="#e3b341"/>
<text x="38" y="1202" fill="#e6edf3" font-size="11.5">On the strictest same-knowledge cut (dual-written memories, n=53) mimir leads 94% vs 91% - pure memory recall is its home turf</text>
<circle cx="26" cy="1219" r="3" fill="#e3b341"/>
<text x="38" y="1223" fill="#e6edf3" font-size="11.5">On prompt-only drift, mimir's full-catch is higher (44% vs 40%); THOR's as-deployed noise gates cost catch (19%)</text>
<circle cx="26" cy="1240" r="3" fill="#e3b341"/>
<text x="38" y="1244" fill="#e6edf3" font-size="11.5">Curated docs can beat raw ingest: on one project's design questions mimir's hand-written doc collection scored 97% vs 87%</text>
<circle cx="26" cy="1261" r="3" fill="#e3b341"/>
<text x="38" y="1265" fill="#e6edf3" font-size="11.5">mimir has a code-symbol graph (graph/outline/peek) that THOR deliberately does NOT - for 'which functions call X'</text>
<circle cx="26" cy="1282" r="3" fill="#e3b341"/>
<text x="38" y="1286" fill="#e6edf3" font-size="11.5">Semantic mode needs a ~235 MB model + a ~570 MB warm daemon (off by default; degrades cleanly to bm25)</text>
<circle cx="26" cy="1303" r="3" fill="#e3b341"/>
<text x="38" y="1307" fill="#e6edf3" font-size="11.5">Newer and far less battle-tested than mimir's daily use</text>
<circle cx="26" cy="1324" r="3" fill="#e3b341"/>
<text x="38" y="1328" fill="#e6edf3" font-size="11.5">One machine, private corpus, LLM-judged - only the drift mechanism is reproducible from this repo (examples/drift_eval.rs)</text>
<line x1="20" y1="1357" x2="840" y2="1357" stroke="#21262d" stroke-width="1"/>
<text x="20" y="1377" fill="#e6edf3" font-size="13.5" font-weight="700">Bottom line  <tspan fill="#22d3ee">coverage 68% vs 59%</tspan>  .  <tspan fill="#c9d1d9">same-knowledge 65% vs 57%</tspan>  .  <tspan fill="#c9d1d9">multi-project 94% vs 59%</tspan>  .  <tspan fill="#22d3ee">1.9x faster, 2.4x fewer tokens</tspan></text>
</svg>
