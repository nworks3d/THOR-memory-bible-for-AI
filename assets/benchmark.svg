<text x="20" y="428" fill="#e6edf3" font-size="13" font-weight="700">Test 1 overall  <tspan fill="#22d3ee">THOR 89.2%</tspan> vs <tspan fill="#8b949e">mimir 84.6%</tspan>  (n=200) - a TIE with a THOR edge: 28 W / 17 L, p = 0.14</text>
<text x="20" y="444" fill="#8b949e" font-size="11">No gap in this table is significant. Code-structure - last round's one significant mimir win (57.6 vs 74.2, p 0.013) -</text>
<text x="20" y="460" fill="#8b949e" font-size="11">is closed to an EXACT TIE: 72.6 vs 72.6, 8 wins to 8, now that deliberate recall serves structure cards (v0.9.6).</text>
<text x="20" y="476" fill="#8b949e" font-size="11">Battery and jury changed across rounds (200 = 152 shared + 48 stratified, seeded; 3 sonnet lenses this round), so</text>
<text x="20" y="492" fill="#8b949e" font-size="11">absolutes are not comparable across rounds - read gaps within the round. The 2026-07-14 lead claim stays retracted.</text>
