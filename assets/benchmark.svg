<text x="20" y="428" fill="#e6edf3" font-size="13" font-weight="700">Test 1 overall  <tspan fill="#22d3ee">THOR 63.8%</tspan> vs <tspan fill="#8b949e">mimir 64.0%</tspan>  (n=200, full V5 run) - a statistical tie</text>
<text x="20" y="444" fill="#8b949e" font-size="11">The CODE rows show the current state: re-judged after the V6/V7 fixes (fresh dumps, fresh blind juries, same 93</text>
<text x="20" y="460" fill="#8b949e" font-size="11">items). In the original full run they read 42.4 vs 63.6 and 60.0 vs 62.5 - the overall above still uses those, so</text>
<text x="20" y="476" fill="#8b949e" font-size="11">it UNDERSTATES THOR's current position. Knowledge rows and the overall are the full V5 run, unchanged.</text>
<text x="20" y="506" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">HOW THE CODE CATEGORIES GOT THERE (V6 + V7 rounds)</text>
<text x="20" y="522" fill="#8b949e" font-size="11">serving parity + path affinity, then the derived symbol sidecar . re-judged per round</text>
<text x="20" y="532" fill="#c9d1d9" font-size="11">Behavior flipped and held above 70 twice (60.0 -> 71.7 -> 72.5 vs mimir 62.5 -> 57.5 -> 59.2). Structure went</text>
<text x="20" y="548" fill="#c9d1d9" font-size="11">42.4 -> 50.0 -> 54.5 while mimir fell 63.6 -> 57.6 -> 56.1: a 21-point gap closed to 1.6 - and excluding four</text>
<text x="20" y="564" fill="#c9d1d9" font-size="11">dead-source items (files deliberately removed; both systems score zero) both judge at exactly 60.3% vs 60.3%.</text>
<text x="20" y="580" fill="#c9d1d9" font-size="11">New agent tools from the same round: where_used / impact / outline on a derived, rebuildable symbol sidecar.</text>
<text x="20" y="610" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 2 - SAME KNOWLEDGE  (facts both systems verifiably hold)</text>
