<line x1="20" y1="410" x2="840" y2="410" stroke="#21262d" stroke-width="1"/>
<text x="20" y="428" fill="#e6edf3" font-size="13" font-weight="700">Test 1 overall  <tspan fill="#22d3ee">THOR 63.8%</tspan> vs <tspan fill="#8b949e">mimir 64.0%</tspan>  (n=200) - a statistical tie</text>
<text x="20" y="444" fill="#8b949e" font-size="11">Clean split: THOR leads every knowledge category (decision, gotcha, docs, config); mimir leads both code categories.</text>
<text x="20" y="460" fill="#8b949e" font-size="11">Jury strictness moved the absolutes asymmetrically vs the previous round (THOR 68.5 -> 63.8, mimir 59.8 -> 64.0), same corpus.</text>
<text x="20" y="490" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 2 - SAME KNOWLEDGE  (facts both systems verifiably hold)</text>
<text x="20" y="506" fill="#8b949e" font-size="11">RE-MEASURED on a rebuilt shared subset . cuts over the judged Test 1 medians</text>
<rect x="196" y="516" width="317.5" height="14" rx="7" fill="#22d3ee"/>
<text x="520.46" y="527.5" fill="#e6edf3" font-size="11.5" font-weight="700">96%</text>
<text x="184" y="527.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="538" fill="#e6edf3" font-size="13" font-weight="700">Strict dual-written (n=53)</text>
<text x="838" y="539" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+3%</text>
<rect x="196" y="536" width="308.2" height="14" rx="7" fill="#484f58"/>
<text x="511.22" y="547.5" fill="#8b949e" font-size="11.5">93%</text>
<text x="184" y="547.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="566" width="254.1" height="14" rx="7" fill="#22d3ee"/>
<text x="457.10" y="577.5" fill="#e6edf3" font-size="11.5" font-weight="700">77%</text>
<text x="184" y="577.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="588" fill="#e6edf3" font-size="13" font-weight="700">Broad shared (n=152)</text>
<text x="838" y="589" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-4%</text>
<rect x="196" y="586" width="268.0" height="14" rx="7" fill="#484f58"/>
<text x="470.96" y="597.5" fill="#8b949e" font-size="11.5">81%</text>
<text x="184" y="597.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="616" fill="#c9d1d9" font-size="11">THOR takes the strict dual-written cut FOR THE FIRST TIME (96.2% vs 93.4%) - pure memory recall was mimir's home</text>
<text x="20" y="632" fill="#c9d1d9" font-size="11">turf across four earlier juries. mimir takes the broad cut, which is two-thirds code/doc-chunk questions.</text>
<text x="20" y="662" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 3 - MULTI-PROJECT  (three private project repos seeded)</text>
<text x="20" y="678" fill="#8b949e" font-size="11">45 real questions from each repo, scoped per project, blind-judged by 3-judge median . top-5 full chunks</text>
<rect x="196" y="688" width="297.0" height="14" rx="7" fill="#22d3ee"/>
<text x="500.00" y="699.5" fill="#e6edf3" font-size="11.5" font-weight="700">90%</text>
<text x="184" y="699.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="710" fill="#e6edf3" font-size="13" font-weight="700">Project 1</text>
<text x="838" y="711" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-3%</text>
<rect x="196" y="708" width="307.9" height="14" rx="7" fill="#484f58"/>
<text x="510.89" y="719.5" fill="#8b949e" font-size="11.5">93%</text>
<text x="184" y="719.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="738" width="330.0" height="14" rx="7" fill="#22d3ee"/>
<text x="533.00" y="749.5" fill="#e6edf3" font-size="11.5" font-weight="700">100%</text>
<text x="184" y="749.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="760" fill="#e6edf3" font-size="13" font-weight="700">Project 2</text>
<text x="838" y="761" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+13%</text>
<rect x="196" y="758" width="286.1" height="14" rx="7" fill="#484f58"/>
<text x="489.11" y="769.5" fill="#8b949e" font-size="11.5">87%</text>
<text x="184" y="769.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="788" width="286.1" height="14" rx="7" fill="#22d3ee"/>
<text x="489.11" y="799.5" fill="#e6edf3" font-size="11.5" font-weight="700">87%</text>
<text x="184" y="799.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="810" fill="#e6edf3" font-size="13" font-weight="700">Project 3</text>
<text x="838" y="811" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-10%</text>
<rect x="196" y="808" width="319.1" height="14" rx="7" fill="#484f58"/>
<text x="522.11" y="819.5" fill="#8b949e" font-size="11.5">97%</text>
<text x="184" y="819.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<line x1="20" y1="838" x2="840" y2="838" stroke="#21262d" stroke-width="1"/>
<text x="20" y="856" fill="#e6edf3" font-size="13" font-weight="700">Test 3 overall  <tspan fill="#22d3ee">THOR 92.2%</tspan> vs <tspan fill="#8b949e">mimir 92.2%</tspan>  (n=45) - a dead tie</text>
<text x="20" y="872" fill="#8b949e" font-size="11">mimir's previous outright lead (98.9% vs 92.2%) is gone. Per-project numbers on n=15 move with a single question</text>
<text x="20" y="888" fill="#8b949e" font-size="11">(6.7 points each): treat the project split as noisy and the overall tie as the takeaway.</text>
<text x="20" y="918" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">SESSION DRIFT COMPENSATION  (73 fresh-session scenarios)</text>
<text x="20" y="934" fill="#8b949e" font-size="11">post-compaction, empty context: does the AS-DEPLOYED auto-injection surface the fact that stops the drift?</text>
<rect x="196" y="944" width="237.9" height="14" rx="7" fill="#22d3ee"/>
<text x="440.93" y="955.5" fill="#e6edf3" font-size="11.5" font-weight="700">72%</text>
<text x="184" y="955.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="966" fill="#e6edf3" font-size="13" font-weight="700">Preventer surfaced</text>
<text x="838" y="967" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+13%</text>
<rect x="196" y="964" width="194.4" height="14" rx="7" fill="#484f58"/>
<text x="397.37" y="975.5" fill="#8b949e" font-size="11.5">59%</text>
<text x="184" y="975.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="994" width="184.5" height="14" rx="7" fill="#22d3ee"/>
<text x="387.47" y="1005.5" fill="#e6edf3" font-size="11.5" font-weight="700">56%</text>
<text x="184" y="1005.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="1016" fill="#e6edf3" font-size="13" font-weight="700">Clear catch (full)</text>
<text x="838" y="1017" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+8%</text>
<rect x="196" y="1014" width="158.1" height="14" rx="7" fill="#484f58"/>
<text x="361.07" y="1025.5" fill="#8b949e" font-size="11.5">48%</text>
<text x="184" y="1025.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="1044" fill="#c9d1d9" font-size="11">THOR's best drift numbers to date, judged THREE-WAY BLIND for the first time (courier / deliberate / mimir shuffled</text>
<text x="20" y="1060" fill="#c9d1d9" font-size="11">onto anonymous sides in one jury pass). The as-deployed courier now also beats THOR's own deliberate recall</text>
<text x="20" y="1076" fill="#c9d1d9" font-size="11">(62.5 / 48.6) - author-declared bilingual fires-when triggers fire on task prompts score-only ranking misses.</text>
<text x="20" y="1092" fill="#c9d1d9" font-size="11">Pins + file/command guards cover the rest by construction: cargo run --example drift_eval, reproducible in-repo.</text>
<text x="20" y="1122" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">SPEED AND TOKENS  (per-prompt cost, lower is better)</text>
<text x="20" y="1138" fill="#8b949e" font-size="11">THOR cold vs mimir's as-deployed cold path, median of 20, canonical fixed 20-prompt set</text>
<rect x="196" y="1148" width="117.5" height="14" rx="7" fill="#22d3ee"/>
<text x="320.52" y="1159.5" fill="#e6edf3" font-size="11.5" font-weight="700">207 ms</text>
<text x="184" y="1159.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="1170" fill="#e6edf3" font-size="13" font-weight="700">Latency (as-deployed)</text>
<text x="838" y="1171" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">2.8x faster</text>
<rect x="196" y="1168" width="330.0" height="14" rx="7" fill="#484f58"/>
<text x="533.00" y="1179.5" fill="#8b949e" font-size="11.5">581 ms</text>
<text x="184" y="1179.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="1198" width="330.0" height="14" rx="7" fill="#22d3ee"/>
<text x="533.00" y="1209.5" fill="#e6edf3" font-size="11.5" font-weight="700">784</text>
<text x="184" y="1209.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="1220" fill="#e6edf3" font-size="13" font-weight="700">Tokens injected</text>
<text x="838" y="1221" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">3.3x MORE (not fewer)</text>
<rect x="196" y="1218" width="99.8" height="14" rx="7" fill="#484f58"/>
<text x="302.76" y="1229.5" fill="#8b949e" font-size="11.5">237</text>
<text x="184" y="1229.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="1248" fill="#c9d1d9" font-size="11">NEW: THOR's own opt-in warm inject daemon (idea credit mimir) serves the provably IDENTICAL decision at 192.7 ms.</text>
<text x="20" y="1264" fill="#c9d1d9" font-size="11">mimir's opt-in warm daemon stays the fastest channel outright - 38.9 ms, ~32 tokens - but served NOTHING on 10 of</text>
<text x="20" y="1280" fill="#c9d1d9" font-size="11">the 20 prompts (single floor-gated memory): faster and cheaper because it serves less. THOR's cold median is back</text>
<text x="20" y="1296" fill="#c9d1d9" font-size="11">under its own 250 ms guardrail (253 -> 206.8 ms). Old '1.5x faster / 2.1x fewer tokens' headline stays retired.</text>
<text x="20" y="1326" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">HONEST DOWNSIDES</text>
<text x="20" y="1342" fill="#8b949e" font-size="11">where THOR does not win, and the caveats</text>
<circle cx="26" cy="1360" r="3" fill="#e3b341"/>
<text x="38" y="1364" fill="#e6edf3" font-size="11.5">Test 1 overall is a tie now, not a THOR lead - and the movement was asymmetric (THOR down, mimir up, same corpus)</text>
<circle cx="26" cy="1381" r="3" fill="#e3b341"/>
<text x="38" y="1385" fill="#e6edf3" font-size="11.5">mimir wins code-structure decisively, 64% vs 42% - code ranking is the clearest open problem in THOR's recall</text>
<circle cx="26" cy="1402" r="3" fill="#e3b341"/>
<text x="38" y="1406" fill="#e6edf3" font-size="11.5">mimir wins the broad shared cut (81.2% vs 77.0%) - two-thirds code questions, same weakness on an equal corpus</text>
<circle cx="26" cy="1423" r="3" fill="#e3b341"/>
<text x="38" y="1427" fill="#e6edf3" font-size="11.5">The 80%-everywhere goal still does not stand: 0 of 8 v4 gates (config how-to closest at 79.4%, drift surfaced 72.1%)</text>
<circle cx="26" cy="1444" r="3" fill="#e3b341"/>
<text x="38" y="1448" fill="#e6edf3" font-size="11.5">mimir's warm daemon beats THOR's latency class outright (38.9 vs 192.7 ms warm), THOR injects ~3.3x more tokens than mimir cold</text>
<circle cx="26" cy="1465" r="3" fill="#e3b341"/>
<text x="38" y="1469" fill="#e6edf3" font-size="11.5">Three drift golds stay honest misses: deep-drift prompts share no vocabulary with the fact; left as gaps, not trigger-stuffed</text>
<circle cx="26" cy="1486" r="3" fill="#e3b341"/>
<text x="38" y="1490" fill="#e6edf3" font-size="11.5">mimir has a code-symbol graph (graph/outline/peek) that THOR deliberately does NOT - for 'which functions call X'</text>
<circle cx="26" cy="1507" r="3" fill="#e3b341"/>
<text x="38" y="1511" fill="#e6edf3" font-size="11.5">Semantic mode needs a ~235 MB model + a warm embed-daemon resident (off by default; degrades cleanly to bm25)</text>
<circle cx="26" cy="1528" r="3" fill="#e3b341"/>
<text x="38" y="1532" fill="#e6edf3" font-size="11.5">Newer and far less battle-tested than mimir's daily use</text>
<circle cx="26" cy="1549" r="3" fill="#e3b341"/>
<text x="38" y="1553" fill="#e6edf3" font-size="11.5">One machine, private corpus, LLM-judged - only the drift mechanism is reproducible from this repo (examples/drift_eval.rs)</text>
<line x1="20" y1="1582" x2="840" y2="1582" stroke="#21262d" stroke-width="1"/>
<text x="20" y="1602" fill="#e6edf3" font-size="13.5" font-weight="700">Bottom line  <tspan fill="#c9d1d9">coverage 63.8% vs 64.0% (tie)</tspan>  .  <tspan fill="#22d3ee">strict dual-written 96.2% vs 93.4% (first THOR win)</tspan>  .  <tspan fill="#c9d1d9">multi-project tie</tspan>  .  <tspan fill="#22d3ee">drift 72% vs 59%, latency 2.8x faster than mimir cold</tspan></text>
</svg>
