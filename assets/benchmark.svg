<text x="20" y="976" fill="#e6edf3" font-size="13" font-weight="700">Test 3 overall  <tspan fill="#22d3ee">THOR 92.2%</tspan> vs <tspan fill="#8b949e">mimir 92.2%</tspan>  (n=45) - a dead tie</text>
