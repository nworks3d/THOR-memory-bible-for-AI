<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 1634" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
<rect x="0" y="0" width="860" height="1634" rx="10" fill="#0d1117"/>
<text x="20" y="32" fill="#e6edf3" font-size="22" font-weight="800">THOR vs mimir - the honest picture</text>
<text x="20" y="54" fill="#8b949e" font-size="12">Same machine, blind-judged, every test re-measured fresh in the V5 round (3-judge median, fresh blind maps, one run no re-rolls). Wins and losses.</text>
