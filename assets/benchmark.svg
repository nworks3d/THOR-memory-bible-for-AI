<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 1641" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
<rect x="0" y="0" width="860" height="1641" rx="10" fill="#0d1117"/>
<text x="20" y="32" fill="#e6edf3" font-size="22" font-weight="800">THOR vs mimir - the honest picture</text>
<text x="20" y="54" fill="#8b949e" font-size="12">Same machine, blind-judged, re-measured fresh 2026-07-21 vs mimir v0.15.0. Sign test on per-question wins.</text>
<text x="20" y="84" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 1 - COVERAGE  (200 questions: shared-knowledge + category-stratified)</text>
<text x="20" y="100" fill="#8b949e" font-size="11">deliberate recall over the live store . higher is better . p = exact sign test</text>
<rect x="196" y="110" width="272.2" height="14" rx="7" fill="#22d3ee"/>
<text x="475.25" y="121.5" fill="#e6edf3" font-size="11.5" font-weight="700">82%</text>
<text x="184" y="121.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="132" fill="#e6edf3" font-size="13" font-weight="700">Doc reference</text>
<text x="838" y="133" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">p 0.17</text>
<rect x="196" y="130" width="227.0" height="14" rx="7" fill="#484f58"/>
<text x="430.04" y="141.5" fill="#8b949e" font-size="11.5">69%</text>
<text x="184" y="141.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="160" width="250.5" height="14" rx="7" fill="#22d3ee"/>
<text x="453.47" y="171.5" fill="#e6edf3" font-size="11.5" font-weight="700">76%</text>
<text x="184" y="171.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="182" fill="#e6edf3" font-size="13" font-weight="700">Decision</text>
<text x="838" y="183" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">p 0.45</text>
<rect x="196" y="180" width="226.0" height="14" rx="7" fill="#484f58"/>
<text x="429.05" y="191.5" fill="#8b949e" font-size="11.5">68%</text>
<text x="184" y="191.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="210" width="271.9" height="14" rx="7" fill="#22d3ee"/>
<text x="474.92" y="221.5" fill="#e6edf3" font-size="11.5" font-weight="700">82%</text>
<text x="184" y="221.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="232" fill="#e6edf3" font-size="13" font-weight="700">Config how-to</text>
<text x="838" y="233" fill="#c9d1d9" font-size="15" font-weight="800" text-anchor="end">tie</text>
<rect x="196" y="230" width="271.9" height="14" rx="7" fill="#484f58"/>
<text x="474.92" y="241.5" fill="#8b949e" font-size="11.5">82%</text>
<text x="184" y="241.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="260" width="233.6" height="14" rx="7" fill="#22d3ee"/>
<text x="436.64" y="271.5" fill="#e6edf3" font-size="11.5" font-weight="700">71%</text>
<text x="184" y="271.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="282" fill="#e6edf3" font-size="13" font-weight="700">Code behavior</text>
<text x="838" y="283" fill="#c9d1d9" font-size="15" font-weight="800" text-anchor="end">tie</text>
<rect x="196" y="280" width="233.6" height="14" rx="7" fill="#484f58"/>
<text x="436.64" y="291.5" fill="#8b949e" font-size="11.5">71%</text>
<text x="184" y="291.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="310" width="251.1" height="14" rx="7" fill="#22d3ee"/>
<text x="454.13" y="321.5" fill="#e6edf3" font-size="11.5" font-weight="700">76%</text>
<text x="184" y="321.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="332" fill="#e6edf3" font-size="13" font-weight="700">Gotcha</text>
<text x="838" y="333" fill="#c9d1d9" font-size="15" font-weight="800" text-anchor="end">n/a</text>
<rect x="196" y="330" width="258.4" height="14" rx="7" fill="#484f58"/>
<text x="461.39" y="341.5" fill="#8b949e" font-size="11.5">78%</text>
<text x="184" y="341.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="360" width="190.1" height="14" rx="7" fill="#22d3ee"/>
<text x="393.08" y="371.5" fill="#e6edf3" font-size="11.5" font-weight="700">58%</text>
<text x="184" y="371.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="382" fill="#e6edf3" font-size="13" font-weight="700">Code structure</text>
<text x="838" y="383" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">p 0.013</text>
<rect x="196" y="380" width="244.9" height="14" rx="7" fill="#484f58"/>
<text x="447.86" y="391.5" fill="#8b949e" font-size="11.5">74%</text>
<text x="184" y="391.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<line x1="20" y1="410" x2="840" y2="410" stroke="#21262d" stroke-width="1"/>
<text x="20" y="428" fill="#e6edf3" font-size="13" font-weight="700">Test 1 overall  <tspan fill="#22d3ee">THOR 73.2%</tspan> vs <tspan fill="#8b949e">mimir 72.5%</tspan>  (n=200) - a TIE: 33 wins to 34, p = 1.00</text>
<text x="20" y="444" fill="#8b949e" font-size="11">133 of 200 questions score identically. One difference survives a significance test and it is mimir's: code-structure,</text>
<text x="20" y="460" fill="#8b949e" font-size="11">where it takes 12 of the 14 questions the two disagree on. The previous round published 77.0 vs 70.5 as a THOR lead;</text>
<text x="20" y="476" fill="#8b949e" font-size="11">that claim is retracted. doc-reference is the largest THOR-favouring gap but does not reach significance on n=40.</text>
<text x="20" y="506" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 2 - SAME KNOWLEDGE  (facts both systems verifiably hold)</text>
<text x="20" y="522" fill="#8b949e" font-size="11">cuts over the judged Test 1 medians . the equal-corpus comparison</text>
<rect x="196" y="532" width="311.2" height="14" rx="7" fill="#22d3ee"/>
<text x="514.19" y="543.5" fill="#e6edf3" font-size="11.5" font-weight="700">94%</text>
<text x="184" y="543.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="554" fill="#e6edf3" font-size="13" font-weight="700">Strict dual-written (n=53)</text>
<text x="838" y="555" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">p 0.73</text>
<rect x="196" y="552" width="317.5" height="14" rx="7" fill="#484f58"/>
<text x="520.46" y="563.5" fill="#8b949e" font-size="11.5">96%</text>
<text x="184" y="563.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="582" width="268.0" height="14" rx="7" fill="#22d3ee"/>
<text x="470.96" y="593.5" fill="#e6edf3" font-size="11.5" font-weight="700">81%</text>
<text x="184" y="593.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="604" fill="#e6edf3" font-size="13" font-weight="700">Broad shared (n=152)</text>
<text x="838" y="605" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">p 0.39</text>
<rect x="196" y="602" width="276.9" height="14" rx="7" fill="#484f58"/>
<text x="479.87" y="613.5" fill="#8b949e" font-size="11.5">84%</text>
<text x="184" y="613.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="632" fill="#c9d1d9" font-size="11">Both are ties, with mimir nominally ahead. The previous round published 97.2 vs 94.3 and 88.8 vs 86.2 and claimed</text>
<text x="20" y="648" fill="#c9d1d9" font-size="11">THOR won both cuts - retracted. Pure ranking over an equal corpus is not a THOR advantage.</text>
<text x="20" y="678" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 3 - MULTI-PROJECT  (three private project repos)</text>
<text x="20" y="694" fill="#8b949e" font-size="11">45 questions written from each repo itself, scoped per project, top-5 full chunks, blind-judged</text>
<rect x="196" y="704" width="307.9" height="14" rx="7" fill="#22d3ee"/>
<text x="510.89" y="715.5" fill="#e6edf3" font-size="11.5" font-weight="700">93%</text>
<text x="184" y="715.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="726" fill="#e6edf3" font-size="13" font-weight="700">Project 1</text>
<text x="838" y="727" fill="#c9d1d9" font-size="15" font-weight="800" text-anchor="end">tie</text>
<rect x="196" y="724" width="307.9" height="14" rx="7" fill="#484f58"/>
<text x="510.89" y="735.5" fill="#8b949e" font-size="11.5">93%</text>
<text x="184" y="735.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="754" width="286.1" height="14" rx="7" fill="#22d3ee"/>
<text x="489.11" y="765.5" fill="#e6edf3" font-size="11.5" font-weight="700">87%</text>
<text x="184" y="765.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="776" fill="#e6edf3" font-size="13" font-weight="700">Project 2</text>
<text x="838" y="777" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-7%</text>
<rect x="196" y="774" width="307.9" height="14" rx="7" fill="#484f58"/>
<text x="510.89" y="785.5" fill="#8b949e" font-size="11.5">93%</text>
<text x="184" y="785.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<rect x="196" y="804" width="274.9" height="14" rx="7" fill="#22d3ee"/>
<text x="477.89" y="815.5" fill="#e6edf3" font-size="11.5" font-weight="700">83%</text>
<text x="184" y="815.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="826" fill="#e6edf3" font-size="13" font-weight="700">Project 3</text>
<text x="838" y="827" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-13%</text>
<rect x="196" y="824" width="319.1" height="14" rx="7" fill="#484f58"/>
<text x="522.11" y="835.5" fill="#8b949e" font-size="11.5">97%</text>
<text x="184" y="835.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<line x1="20" y1="854" x2="840" y2="854" stroke="#21262d" stroke-width="1"/>
<text x="20" y="872" fill="#e6edf3" font-size="13" font-weight="700">Test 3 overall  <tspan fill="#22d3ee">THOR 87.8%</tspan> vs <tspan fill="#8b949e">mimir 94.4%</tspan>  (n=45) - mimir ahead, p = 0.11, not significant</text>
<text x="20" y="888" fill="#8b949e" font-size="11">One question moves a 15-question project by 6.7 points, so read the split as noisy. The previous round published</text>
<text x="20" y="904" fill="#8b949e" font-size="11">96.7 vs 95.6 in THOR's favour - also retracted.</text>
<text x="20" y="934" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">SESSION DRIFT  (73 fresh-session scenarios)</text>
<text x="20" y="950" fill="#8b949e" font-size="11">post-compaction, empty context: does memory surface the fact that stops the drift? silence scores zero</text>
<rect x="196" y="960" width="221.4" height="14" rx="7" fill="#22d3ee"/>
<text x="424.43" y="971.5" fill="#e6edf3" font-size="11.5" font-weight="700">67%</text>
<text x="184" y="971.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="982" fill="#e6edf3" font-size="13" font-weight="700">Preventer surfaced vs mimir's BEST channel</text>
<text x="838" y="983" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">p 0.043</text>
<rect x="196" y="980" width="244.2" height="14" rx="7" fill="#484f58"/>
<text x="447.20" y="991.5" fill="#8b949e" font-size="11.5">74%</text>
<text x="184" y="991.5" fill="#8b949e" font-size="10.5" text-anchor="end">recall --all</text>
<rect x="196" y="1010" width="221.4" height="14" rx="7" fill="#22d3ee"/>
<text x="424.43" y="1021.5" fill="#e6edf3" font-size="11.5" font-weight="700">67%</text>
<text x="184" y="1021.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="1032" fill="#e6edf3" font-size="13" font-weight="700">Preventer surfaced vs mimir's HOOK</text>
<text x="838" y="1033" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">p &lt;0.0001</text>
<rect x="196" y="1030" width="122.1" height="14" rx="7" fill="#484f58"/>
<text x="325.10" y="1041.5" fill="#8b949e" font-size="11.5">37%</text>
<text x="184" y="1041.5" fill="#8b949e" font-size="10.5" text-anchor="end">recall-inject</text>
<text x="20" y="1060" fill="#c9d1d9" font-size="11">The comparison splits in two and both halves are real. On CAPABILITY mimir wins: its full recall beats THOR's courier</text>
<text x="20" y="1076" fill="#c9d1d9" font-size="11">(21 wins to 9) and ties THOR's deliberate channel at 72.6%. On WHAT RUNS UNASKED THOR wins 37 to 6: mimir's hook</text>
<text x="20" y="1092" fill="#c9d1d9" font-size="11">misses 46 of 73 scenarios and returns nothing at all on 2. mimir's winning channel is not a hook - you must call it.</text>
<text x="20" y="1108" fill="#c9d1d9" font-size="11">Separately reproducible in-repo, no judge needed: cargo run --example drift_eval (catches AND false fires).</text>
<text x="20" y="1138" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">SPEED  (per-prompt cost, lower is better)</text>
<text x="20" y="1154" fill="#8b949e" font-size="11">as-deployed, correct invocation each side (THOR stdin hook, mimir prompt arg) . median of 20, warm-up discarded</text>
<rect x="196" y="1164" width="123.5" height="14" rx="7" fill="#22d3ee"/>
<text x="326.50" y="1175.5" fill="#e6edf3" font-size="11.5" font-weight="700">125 ms</text>
<text x="184" y="1175.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<text x="20" y="1186" fill="#e6edf3" font-size="13" font-weight="700">Automatic channel vs mimir's full recall</text>
<text x="838" y="1187" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">2.7x faster</text>
<rect x="196" y="1184" width="330.0" height="14" rx="7" fill="#484f58"/>
<text x="533.00" y="1195.5" fill="#8b949e" font-size="11.5">334 ms</text>
<text x="184" y="1195.5" fill="#8b949e" font-size="10.5" text-anchor="end">recall --all</text>
<text x="20" y="1214" fill="#c9d1d9" font-size="11">THOR's courier answers EVERY prompt in 125 ms - 0 of 20 empty. mimir's hook is three times faster at 41 ms but</text>
<text x="20" y="1230" fill="#c9d1d9" font-size="11">returns nothing on 6 of 20: it is fast because it often serves nothing. The mimir channel that WINS the drift test</text>
<text x="20" y="1246" fill="#c9d1d9" font-size="11">costs 334 ms and is not a hook. That trade - always-on and adequate, versus on-demand and better - is the whole</text>
<text x="20" y="1262" fill="#c9d1d9" font-size="11">argument, and it is a judgement about how you work rather than a number this benchmark can settle.</text>
<text x="20" y="1292" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">HONEST DOWNSIDES</text>
<text x="20" y="1308" fill="#8b949e" font-size="11">where THOR does not win, and the caveats</text>
<circle cx="26" cy="1326" r="3" fill="#e3b341"/>
<text x="38" y="1330" fill="#e6edf3" font-size="11.5">THOR leads NO quality metric this round. Coverage, both same-knowledge cuts, multi-project and drift-capability are</text>
<circle cx="26" cy="1347" r="3" fill="#e3b341"/>
<text x="38" y="1351" fill="#e6edf3" font-size="11.5">all ties or mimir wins. The one defensible THOR advantage is operational: it answers every prompt and never goes silent.</text>
<circle cx="26" cy="1368" r="3" fill="#e3b341"/>
<text x="38" y="1372" fill="#e6edf3" font-size="11.5">Code-structure is a SIGNIFICANT loss (57.6 vs 74.2, p 0.013) and it widened since the last round. The symbol-graph</text>
<circle cx="26" cy="1389" r="3" fill="#e3b341"/>
<text x="38" y="1393" fill="#e6edf3" font-size="11.5">explanation we published for it did not survive scrutiny and has not been re-tested, so the cause is still unknown.</text>
<circle cx="26" cy="1410" r="3" fill="#e3b341"/>
<text x="38" y="1414" fill="#e6edf3" font-size="11.5">An earlier version of THIS round measured drift against mimir's hook only and reported THOR winning 3x. That gave</text>
<circle cx="26" cy="1431" r="3" fill="#e3b341"/>
<text x="38" y="1435" fill="#e6edf3" font-size="11.5">mimir its weakest channel; the run was discarded before publication and is recorded here rather than quietly dropped.</text>
<circle cx="26" cy="1452" r="3" fill="#e3b341"/>
<text x="38" y="1456" fill="#e6edf3" font-size="11.5">Do not compare absolutes across rounds: THOR's courier reads 67.1% here against 86.3% last round, while an A/B</text>
<circle cx="26" cy="1473" r="3" fill="#e3b341"/>
<text x="38" y="1477" fill="#e6edf3" font-size="11.5">against the previous release proved its drift output is byte-identical. The code did not change; the jury did.</text>
<circle cx="26" cy="1494" r="3" fill="#e3b341"/>
<text x="38" y="1498" fill="#e6edf3" font-size="11.5">THOR is compute-bound; cold latency grows with store size. The resident cache removes that only while a daemon is up.</text>
<circle cx="26" cy="1515" r="3" fill="#e3b341"/>
<text x="38" y="1519" fill="#e6edf3" font-size="11.5">Newer and far less battle-tested than mimir's daily use; mimir ships at a high cadence (v0.15: inference delegation).</text>
<circle cx="26" cy="1536" r="3" fill="#e3b341"/>
<text x="38" y="1540" fill="#e6edf3" font-size="11.5">One machine, private corpus, LLM-judged - only drift is repo-reproducible (examples/drift_eval.rs).</text>
<line x1="20" y1="1569" x2="840" y2="1569" stroke="#21262d" stroke-width="1"/>
<text x="20" y="1589" fill="#e6edf3" font-size="13.5" font-weight="700">Bottom line <tspan fill="#8b949e">quality is a tie, and mimir wins code-structure and drift-capability outright</tspan></text>
<text x="20" y="1609" fill="#e6edf3" font-size="13.5" font-weight="700"><tspan fill="#22d3ee">THOR's claim is what runs unasked: every prompt, 125 ms, never silent</tspan> . <tspan fill="#e3b341">mimir does better when asked</tspan></text>
</svg>
