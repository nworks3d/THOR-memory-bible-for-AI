<rect x="268" y="230" width="271.9" height="14" rx="7" fill="#484f58"/>
<text x="546.92" y="241.5" fill="#8b949e" font-size="11.5">82%</text>
<text x="256" y="241.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
