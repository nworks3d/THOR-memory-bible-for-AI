<text x="20" y="888" fill="#e6edf3" font-size="13" font-weight="700">Test 3 overall  <tspan fill="#22d3ee">THOR 91.1%</tspan> vs <tspan fill="#8b949e">mimir 94.4%</tspan>  (n=45) - mimir ahead, 2 W / 4 L, p = 0.69, not significant</text>
<text x="20" y="904" fill="#8b949e" font-size="11">One question moves a 15-question project by 6.7 points, so read the split as noisy. The 2026-07-14 claim of a THOR</text>
<text x="20" y="920" fill="#8b949e" font-size="11">lead here (96.7 vs 95.6) stays retracted.</text>
<text x="20" y="950" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">SESSION DRIFT  (59 fresh-session scenarios, five arms, cleaned corpus)</text>
<text x="20" y="966" fill="#8b949e" font-size="11">post-compaction, empty context: does memory surface the fact that stops the drift? silence scores zero</text>
<rect x="268" y="976" width="263.0" height="14" rx="7" fill="#22d3ee"/>
<text x="538.01" y="987.5" fill="#e6edf3" font-size="11.5" font-weight="700">80%</text>
<text x="256" y="987.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">session</text>
