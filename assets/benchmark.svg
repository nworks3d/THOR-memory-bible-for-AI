<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 1318" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
<rect x="0" y="0" width="860" height="1318" rx="10" fill="#0d1117"/>
<text x="20" y="32" fill="#e6edf3" font-size="22" font-weight="800">THOR vs mimir - the honest picture</text>
<text x="20" y="54" fill="#8b949e" font-size="12">Same machine, blind-judged, measured. Coverage, same-knowledge, multi-project, session drift, and speed - wins and losses.</text>
<text x="20" y="84" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 1 - AS-DEPLOYED COVERAGE  (500 real questions)</text>
<text x="20" y="100" fill="#8b949e" font-size="11">what the agent gets automatically, every prompt . higher is better</text>
<rect x="196" y="110" width="263.0" height="14" rx="7" fill="#22d3ee"/>
<text x="466.01" y="121.5" fill="#e6edf3" font-size="11.5" font-weight="700">80%</text>
<text x="184" y="121.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<rect x="196" y="130" width="41.9" height="14" rx="7" fill="#484f58"/>
<text x="244.91" y="141.5" fill="#8b949e" font-size="11.5">13%</text>
<text x="184" y="141.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="132" fill="#e6edf3" font-size="13" font-weight="700">Code structure</text>
<text x="838" y="133" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+67%</text>
<rect x="196" y="160" width="293.7" height="14" rx="7" fill="#22d3ee"/>
<text x="496.7" y="171.5" fill="#e6edf3" font-size="11.5" font-weight="700">89%</text>
<text x="184" y="171.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<rect x="196" y="180" width="70.0" height="14" rx="7" fill="#484f58"/>
<text x="272.96" y="191.5" fill="#8b949e" font-size="11.5">21%</text>
<text x="184" y="191.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="182" fill="#e6edf3" font-size="13" font-weight="700">Code behavior</text>
<text x="838" y="183" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+68%</text>
<rect x="196" y="210" width="279.8" height="14" rx="7" fill="#22d3ee"/>
<text x="482.84" y="221.5" fill="#e6edf3" font-size="11.5" font-weight="700">85%</text>
<text x="184" y="221.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<rect x="196" y="230" width="96.0" height="14" rx="7" fill="#484f58"/>
<text x="299.03" y="241.5" fill="#8b949e" font-size="11.5">29%</text>
<text x="184" y="241.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="232" fill="#e6edf3" font-size="13" font-weight="700">Doc reference</text>
<text x="838" y="233" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+56%</text>
<rect x="196" y="260" width="301.0" height="14" rx="7" fill="#22d3ee"/>
<text x="503.96" y="271.5" fill="#e6edf3" font-size="11.5" font-weight="700">91%</text>
<text x="184" y="271.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<rect x="196" y="280" width="145.5" height="14" rx="7" fill="#484f58"/>
<text x="348.53" y="291.5" fill="#8b949e" font-size="11.5">44%</text>
<text x="184" y="291.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="282" fill="#e6edf3" font-size="13" font-weight="700">Config how-to</text>
<text x="838" y="283" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+47%</text>
<rect x="196" y="310" width="293.4" height="14" rx="7" fill="#22d3ee"/>
<text x="496.37000000000006" y="321.5" fill="#e6edf3" font-size="11.5" font-weight="700">89%</text>
<text x="184" y="321.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<rect x="196" y="330" width="155.8" height="14" rx="7" fill="#484f58"/>
<text x="358.76" y="341.5" fill="#8b949e" font-size="11.5">47%</text>
<text x="184" y="341.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="332" fill="#e6edf3" font-size="13" font-weight="700">Gotcha</text>
<text x="838" y="333" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+42%</text>
<rect x="196" y="360" width="299.6" height="14" rx="7" fill="#22d3ee"/>
<text x="502.64" y="371.5" fill="#e6edf3" font-size="11.5" font-weight="700">91%</text>
<text x="184" y="371.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<rect x="196" y="380" width="203.9" height="14" rx="7" fill="#484f58"/>
<text x="406.94" y="391.5" fill="#8b949e" font-size="11.5">62%</text>
<text x="184" y="391.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="382" fill="#e6edf3" font-size="13" font-weight="700">Decision</text>
<text x="838" y="383" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+29%</text>
<line x1="20" y1="412" x2="840" y2="412" stroke="#21262d" stroke-width="1"/>
<text x="20" y="430" fill="#e6edf3" font-size="13" font-weight="700">Test 1 overall  <tspan fill="#22d3ee">THOR 86%</tspan> vs <tspan fill="#8b949e">mimir 28%</tspan></text>
<text x="20" y="446" fill="#8b949e" font-size="11">THOR ingests your repos into recall; mimir's recall does not index source code (its code lives in a separate graph).</text>
<text x="20" y="476" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 2 - SAME KNOWLEDGE  (118 facts both systems have)</text>
<text x="20" y="492" fill="#8b949e" font-size="11">pure retrieval quality on an equal corpus . the fair, apples-to-apples comparison</text>
<rect x="196" y="502" width="299.3" height="14" rx="7" fill="#22d3ee"/>
<text x="502.31" y="513.5" fill="#e6edf3" font-size="11.5" font-weight="700">91%</text>
<text x="184" y="513.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<rect x="196" y="522" width="247.5" height="14" rx="7" fill="#484f58"/>
<text x="450.5" y="533.5" fill="#8b949e" font-size="11.5">75%</text>
<text x="184" y="533.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="524" fill="#e6edf3" font-size="13" font-weight="700">Answer present</text>
<text x="838" y="525" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+16%</text>
<text x="20" y="552" fill="#c9d1d9" font-size="11">Even on facts both have, THOR leads by +16% . strictest dual-written-only cut (n=53): THOR 94% vs mimir 80%</text>
<text x="20" y="582" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">TEST 3 - MULTI-PROJECT  (today: three private project repos seeded)</text>
<text x="20" y="598" fill="#8b949e" font-size="11">45 real questions from each repo, scoped per project, blind-judged by 3 . today's ingest made this possible</text>
<rect x="196" y="608" width="220.1" height="14" rx="7" fill="#22d3ee"/>
<text x="423.11" y="619.5" fill="#e6edf3" font-size="11.5" font-weight="700">67%</text>
<text x="184" y="619.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<rect x="196" y="628" width="307.9" height="14" rx="7" fill="#484f58"/>
<text x="510.89" y="639.5" fill="#8b949e" font-size="11.5">93%</text>
<text x="184" y="639.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="630" fill="#e6edf3" font-size="13" font-weight="700">Project 1</text>
<text x="838" y="631" fill="#e3b341" font-size="15" font-weight="800" text-anchor="end">-27%</text>
<rect x="196" y="658" width="220.1" height="14" rx="7" fill="#22d3ee"/>
<text x="423.11" y="669.5" fill="#e6edf3" font-size="11.5" font-weight="700">67%</text>
<text x="184" y="669.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<rect x="196" y="678" width="0" height="14" rx="7" fill="#484f58"/>
<text x="203.0" y="689.5" fill="#8b949e" font-size="11.5">0%</text>
<text x="184" y="689.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="680" fill="#e6edf3" font-size="13" font-weight="700">Project 2</text>
<text x="838" y="681" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+67%</text>
<rect x="196" y="708" width="286.1" height="14" rx="7" fill="#22d3ee"/>
<text x="489.11" y="719.5" fill="#e6edf3" font-size="11.5" font-weight="700">87%</text>
<text x="184" y="719.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<rect x="196" y="728" width="220.1" height="14" rx="7" fill="#484f58"/>
<text x="423.11" y="739.5" fill="#8b949e" font-size="11.5">67%</text>
<text x="184" y="739.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="730" fill="#e6edf3" font-size="13" font-weight="700">Project 3</text>
<text x="838" y="731" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+20%</text>
<line x1="20" y1="760" x2="840" y2="760" stroke="#21262d" stroke-width="1"/>
<text x="20" y="778" fill="#e6edf3" font-size="13" font-weight="700">Test 3 overall  <tspan fill="#22d3ee">THOR 73%</tspan> vs <tspan fill="#8b949e">mimir 53%</tspan>  (n=45)</text>
<text x="20" y="794" fill="#8b949e" font-size="11">mimir wins Project 1 on its hand-curated design docs; THOR wins where it uniquely holds the code.</text>
<text x="20" y="809" fill="#8b949e" font-size="11">Scoped clean: 0 of 211 THOR hits came from a foreign project. Project 2 has no mimir doc collection at all.</text>
<text x="20" y="839" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">SESSION DRIFT COMPENSATION  (74 fresh-session scenarios)</text>
<text x="20" y="855" fill="#8b949e" font-size="11">post-compaction, empty context: does auto-recall surface the fact that stops the drift?</text>
<rect x="196" y="865" width="245.2" height="14" rx="7" fill="#22d3ee"/>
<text x="448.19" y="876.5" fill="#e6edf3" font-size="11.5" font-weight="700">74%</text>
<text x="184" y="876.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<rect x="196" y="885" width="194.7" height="14" rx="7" fill="#484f58"/>
<text x="397.7" y="896.5" fill="#8b949e" font-size="11.5">59%</text>
<text x="184" y="896.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="887" fill="#e6edf3" font-size="13" font-weight="700">Preventer surfaced</text>
<text x="838" y="888" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+15%</text>
<rect x="196" y="915" width="169.6" height="14" rx="7" fill="#22d3ee"/>
<text x="372.62" y="926.5" fill="#e6edf3" font-size="11.5" font-weight="700">51%</text>
<text x="184" y="926.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<rect x="196" y="935" width="114.5" height="14" rx="7" fill="#484f58"/>
<text x="317.51" y="946.5" fill="#8b949e" font-size="11.5">35%</text>
<text x="184" y="946.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="937" fill="#e6edf3" font-size="13" font-weight="700">Clear catch</text>
<text x="838" y="938" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">+17%</text>
<text x="20" y="985" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">SPEED  (per-prompt auto-recall, lower is better)</text>
<text x="20" y="1001" fill="#8b949e" font-size="11">warm daemon, median of many runs, same machine</text>
<rect x="196" y="1011" width="107.8" height="14" rx="7" fill="#22d3ee"/>
<text x="310.8346456692913" y="1022.5" fill="#e6edf3" font-size="11.5" font-weight="700">83 ms</text>
<text x="184" y="1022.5" fill="#22d3ee" font-size="10.5" font-weight="700" text-anchor="end">THOR</text>
<rect x="196" y="1031" width="330.0" height="14" rx="7" fill="#484f58"/>
<text x="533.0" y="1042.5" fill="#8b949e" font-size="11.5">254 ms</text>
<text x="184" y="1042.5" fill="#8b949e" font-size="10.5" text-anchor="end">mimir</text>
<text x="20" y="1033" fill="#e6edf3" font-size="13" font-weight="700">Latency (warm)</text>
<text x="838" y="1034" fill="#22d3ee" font-size="15" font-weight="800" text-anchor="end">3.1x faster</text>
<text x="20" y="1081" fill="#c9d1d9" font-size="12.5" font-weight="700" letter-spacing="0.4">HONEST DOWNSIDES</text>
<text x="20" y="1097" fill="#8b949e" font-size="11">where THOR does not win, and the caveats</text>
<circle cx="26" cy="1118" r="3" fill="#e3b341"/>
<text x="38" y="1122" fill="#e6edf3" font-size="11.5">mimir has a code-symbol graph (graph/outline/peek) that THOR deliberately does NOT - for 'which functions call X'</text>
<circle cx="26" cy="1139" r="3" fill="#e3b341"/>
<text x="38" y="1143" fill="#e6edf3" font-size="11.5">Curated docs can beat raw ingest: on one project's design questions mimir's hand-written doc collection scored 93% vs THOR 67%</text>
<circle cx="26" cy="1160" r="3" fill="#e3b341"/>
<text x="38" y="1164" fill="#e6edf3" font-size="11.5">Test 1's big gap is coverage: THOR ingests source, mimir's recall does not - see Test 2 for the pure-ranking win</text>
<circle cx="26" cy="1181" r="3" fill="#e3b341"/>
<text x="38" y="1185" fill="#e6edf3" font-size="11.5">Semantic mode needs a ~235 MB model + a ~570 MB warm daemon (off by default; degrades cleanly to bm25)</text>
<circle cx="26" cy="1202" r="3" fill="#e3b341"/>
<text x="38" y="1206" fill="#e6edf3" font-size="11.5">Newer and far less battle-tested than mimir's daily use</text>
<circle cx="26" cy="1223" r="3" fill="#e3b341"/>
<text x="38" y="1227" fill="#e6edf3" font-size="11.5">One machine, private corpus, LLM-judged (Test 3 by a 3-judge majority) - these exact numbers are not reproducible from this repo</text>
<circle cx="26" cy="1244" r="3" fill="#e3b341"/>
<text x="38" y="1248" fill="#e6edf3" font-size="11.5">Token burn is comparable: ~239 (THOR) vs ~212 (mimir) tokens injected per prompt</text>
<line x1="20" y1="1274" x2="840" y2="1274" stroke="#21262d" stroke-width="1"/>
<text x="20" y="1294" fill="#e6edf3" font-size="13.5" font-weight="700">Bottom line  <tspan fill="#22d3ee">coverage 86% vs 28%</tspan>  .  <tspan fill="#c9d1d9">same-knowledge 91% vs 75%</tspan>  .  <tspan fill="#c9d1d9">multi-project 73% vs 53%</tspan>  .  <tspan fill="#22d3ee">~3.1x faster</tspan></text>
</svg>
